server:
  port: 8080

spring:
  application:
    name: buildgraph-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/buildgraph}
    username: ${SPRING_DATASOURCE_USERNAME:buildgraph}
    password: ${SPRING_DATASOURCE_PASSWORD:buildgraph}
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    username: ${SPRING_RABBITMQ_USERNAME:buildgraph}
    password: ${SPRING_RABBITMQ_PASSWORD:buildgraph}
    listener:
      simple:
        default-requeue-rejected: false
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
  task:
    scheduling:
      # 기본값 1은 모든 @Scheduled 잡이 한 스레드를 공유해, 한 잡(예: 응답 없는 제조사 fetch)이
      # 뒤 잡(가격 갱신·프리웜·티어 스냅샷)을 전부 막는다. 파이프라인 잡을 격리하기 위해 풀을 키운다.
      pool:
        size: ${SCHEDULING_POOL_SIZE:4}

management:
  endpoints:
    web:
      exposure:
        include: health,info

agent:
  runner:
    mode: ${AGENT_RUNNER_MODE:deterministic}
  log-storage-root: ${AGENT_LOG_STORAGE_ROOT:data/agent-logs}
  # PC Agent 데모 등록용 activation token. 기본 빈값이면 데모 등록이 비활성화된다(프로덕션 안전 기본).
  # 데모/개발 환경에서만 env로 명시적으로 켠다. 실서비스는 DB 발급 토큰 방식으로 대체해야 한다.
  demo-activation-token: ${AGENT_DEMO_ACTIVATION_TOKEN:}

openai:
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-5.5}
  reasoning-effort: ${OPENAI_REASONING_EFFORT:medium}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  embedding-dimensions: ${OPENAI_EMBEDDING_DIMENSIONS:1536}

rag:
  vector:
    enabled: ${RAG_VECTOR_ENABLED:true}
    requirement-parse-enabled: ${RAG_VECTOR_REQUIREMENT_PARSE_ENABLED:${RAG_VECTOR_ENABLED:true}}
    build-recommend-enabled: ${RAG_VECTOR_BUILD_RECOMMEND_ENABLED:${RAG_VECTOR_ENABLED:true}}
    as-analyze-enabled: ${RAG_VECTOR_AS_ANALYZE_ENABLED:${RAG_VECTOR_ENABLED:true}}
    public-search-enabled: ${RAG_VECTOR_PUBLIC_SEARCH_ENABLED:${RAG_VECTOR_ENABLED:true}}
  embedding:
    backfill-on-startup: ${RAG_EMBEDDING_BACKFILL_ON_STARTUP:false}

ai:
  as-chat:
    default-profile: ${AS_CHAT_DEFAULT_PROFILE:AS_CHAT_54_MINI_FAST}
    fast:
      model: ${AS_CHAT_FAST_MODEL:gpt-5.5}
      reasoning-effort: ${AS_CHAT_FAST_REASONING_EFFORT:low}
      rag-top-k: ${AS_CHAT_FAST_RAG_TOP_K:2}
      max-output-tokens: ${AS_CHAT_FAST_MAX_OUTPUT_TOKENS:900}
      recent-message-limit: ${AS_CHAT_FAST_RECENT_MESSAGE_LIMIT:3}
      include-evidence-chunk-text: ${AS_CHAT_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:false}
      include-tool-result-payload: ${AS_CHAT_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:false}
      use-compact-prompt: ${AS_CHAT_FAST_USE_COMPACT_PROMPT:true}
    gpt54-fast:
      model: ${AS_CHAT_54_FAST_MODEL:gpt-5.4}
      reasoning-effort: ${AS_CHAT_54_FAST_REASONING_EFFORT:low}
      rag-top-k: ${AS_CHAT_54_FAST_RAG_TOP_K:2}
      max-output-tokens: ${AS_CHAT_54_FAST_MAX_OUTPUT_TOKENS:900}
      recent-message-limit: ${AS_CHAT_54_FAST_RECENT_MESSAGE_LIMIT:3}
      include-evidence-chunk-text: ${AS_CHAT_54_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:false}
      include-tool-result-payload: ${AS_CHAT_54_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:false}
      use-compact-prompt: ${AS_CHAT_54_FAST_USE_COMPACT_PROMPT:true}
    gpt54-mini-fast:
      model: ${AS_CHAT_54_MINI_FAST_MODEL:gpt-5.4-mini}
      reasoning-effort: ${AS_CHAT_54_MINI_FAST_REASONING_EFFORT:low}
      rag-top-k: ${AS_CHAT_54_MINI_FAST_RAG_TOP_K:2}
      max-output-tokens: ${AS_CHAT_54_MINI_FAST_MAX_OUTPUT_TOKENS:850}
      recent-message-limit: ${AS_CHAT_54_MINI_FAST_RECENT_MESSAGE_LIMIT:3}
      include-evidence-chunk-text: ${AS_CHAT_54_MINI_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:false}
      include-tool-result-payload: ${AS_CHAT_54_MINI_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:false}
      use-compact-prompt: ${AS_CHAT_54_MINI_FAST_USE_COMPACT_PROMPT:true}
    nano-fast:
      model: ${AS_CHAT_NANO_FAST_MODEL:gpt-5.4-nano}
      reasoning-effort: ${AS_CHAT_NANO_FAST_REASONING_EFFORT:low}
      rag-top-k: ${AS_CHAT_NANO_FAST_RAG_TOP_K:2}
      max-output-tokens: ${AS_CHAT_NANO_FAST_MAX_OUTPUT_TOKENS:700}
      recent-message-limit: ${AS_CHAT_NANO_FAST_RECENT_MESSAGE_LIMIT:2}
      include-evidence-chunk-text: ${AS_CHAT_NANO_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:false}
      include-tool-result-payload: ${AS_CHAT_NANO_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:false}
      use-compact-prompt: ${AS_CHAT_NANO_FAST_USE_COMPACT_PROMPT:true}
    balanced:
      model: ${AS_CHAT_BALANCED_MODEL:${OPENAI_MODEL:gpt-5.5}}
      reasoning-effort: ${AS_CHAT_BALANCED_REASONING_EFFORT:low}
      rag-top-k: ${AS_CHAT_BALANCED_RAG_TOP_K:3}
      max-output-tokens: ${AS_CHAT_BALANCED_MAX_OUTPUT_TOKENS:1100}
      recent-message-limit: ${AS_CHAT_BALANCED_RECENT_MESSAGE_LIMIT:4}
      include-evidence-chunk-text: ${AS_CHAT_BALANCED_INCLUDE_EVIDENCE_CHUNK_TEXT:false}
      include-tool-result-payload: ${AS_CHAT_BALANCED_INCLUDE_TOOL_RESULT_PAYLOAD:false}
      use-compact-prompt: ${AS_CHAT_BALANCED_USE_COMPACT_PROMPT:true}
    high-quality:
      model: ${AS_CHAT_HIGH_QUALITY_MODEL:gpt-5.5}
      reasoning-effort: ${AS_CHAT_HIGH_QUALITY_REASONING_EFFORT:medium}
      rag-top-k: ${AS_CHAT_HIGH_QUALITY_RAG_TOP_K:5}
      max-output-tokens: ${AS_CHAT_HIGH_QUALITY_MAX_OUTPUT_TOKENS:2600}
      recent-message-limit: ${AS_CHAT_HIGH_QUALITY_RECENT_MESSAGE_LIMIT:5}
      include-evidence-chunk-text: ${AS_CHAT_HIGH_QUALITY_INCLUDE_EVIDENCE_CHUNK_TEXT:true}
      include-tool-result-payload: ${AS_CHAT_HIGH_QUALITY_INCLUDE_TOOL_RESULT_PAYLOAD:false}
      use-compact-prompt: ${AS_CHAT_HIGH_QUALITY_USE_COMPACT_PROMPT:true}
  build-chat:
    default-profile: ${BUILD_CHAT_DEFAULT_PROFILE:BUILD_CHAT_54_MINI_FAST}
    cache:
      enabled: ${BUILD_CHAT_CACHE_ENABLED:true}
      ttl-seconds: ${BUILD_CHAT_CACHE_TTL_SECONDS:600}
      prewarm:
        enabled: ${BUILD_CHAT_CACHE_PREWARM_ENABLED:true}
        ttl-seconds: ${BUILD_CHAT_CACHE_PREWARM_TTL_SECONDS:3600}
        refresh-delay-ms: ${BUILD_CHAT_CACHE_PREWARM_REFRESH_DELAY_MS:2700000}
    semantic-cache:
      enabled: ${BUILD_CHAT_SEMANTIC_CACHE_ENABLED:true}
      threshold: ${BUILD_CHAT_SEMANTIC_CACHE_THRESHOLD:0.94}
      ttl-seconds: ${BUILD_CHAT_SEMANTIC_CACHE_TTL_SECONDS:600}
    tier-snapshot:
      enabled: ${BUILD_CHAT_TIER_SNAPSHOT_ENABLED:true}
      min-budget-won: ${BUILD_CHAT_TIER_SNAPSHOT_MIN_BUDGET_WON:2000000}
      max-budget-won: ${BUILD_CHAT_TIER_SNAPSHOT_MAX_BUDGET_WON:13000000}
      step-won: ${BUILD_CHAT_TIER_SNAPSHOT_STEP_WON:1000000}
      refresh-delay-ms: ${BUILD_CHAT_TIER_SNAPSHOT_REFRESH_DELAY_MS:3600000}
      tolerance-pct: ${BUILD_CHAT_TIER_SNAPSHOT_TOLERANCE_PCT:15}
    fast:
      model: ${BUILD_CHAT_FAST_MODEL:gpt-5.5}
      reasoning-effort: ${BUILD_CHAT_FAST_REASONING_EFFORT:low}
      rag-top-k: ${BUILD_CHAT_FAST_RAG_TOP_K:3}
      max-output-tokens: ${BUILD_CHAT_FAST_MAX_OUTPUT_TOKENS:900}
      recent-message-limit: ${BUILD_CHAT_FAST_RECENT_MESSAGE_LIMIT:0}
    gpt54-fast:
      model: ${BUILD_CHAT_54_FAST_MODEL:gpt-5.4}
      reasoning-effort: ${BUILD_CHAT_54_FAST_REASONING_EFFORT:low}
      rag-top-k: ${BUILD_CHAT_54_FAST_RAG_TOP_K:3}
      max-output-tokens: ${BUILD_CHAT_54_FAST_MAX_OUTPUT_TOKENS:900}
      recent-message-limit: ${BUILD_CHAT_54_FAST_RECENT_MESSAGE_LIMIT:0}
    gpt54-mini-fast:
      model: ${BUILD_CHAT_54_MINI_FAST_MODEL:gpt-5.4-mini}
      reasoning-effort: ${BUILD_CHAT_54_MINI_FAST_REASONING_EFFORT:low}
      rag-top-k: ${BUILD_CHAT_54_MINI_FAST_RAG_TOP_K:3}
      max-output-tokens: ${BUILD_CHAT_54_MINI_FAST_MAX_OUTPUT_TOKENS:850}
      recent-message-limit: ${BUILD_CHAT_54_MINI_FAST_RECENT_MESSAGE_LIMIT:0}

recommendation:
  reranker:
    enabled: ${RECOMMENDATION_RERANKER_ENABLED:false}
    shadow-enabled: ${RECOMMENDATION_RERANKER_SHADOW_ENABLED:true}
    endpoint: ${RECOMMENDATION_RERANKER_ENDPOINT:http://localhost:8091/score}
    timeout-ms: ${RECOMMENDATION_RERANKER_TIMEOUT_MS:1200}
  # M2 자동 재훈련(주 1회). 기본 off — 자동 학습을 켤지는 운영 결정. 승급은 하지 않는다(SHADOW까지만).
  auto-retrain:
    enabled: ${RECOMMENDATION_AUTO_RETRAIN_ENABLED:false}
    cron: "${RECOMMENDATION_AUTO_RETRAIN_CRON:0 0 3 * * SUN}"
    zone: "${RECOMMENDATION_AUTO_RETRAIN_ZONE:Asia/Seoul}"
    min-new-events: ${RECOMMENDATION_AUTO_RETRAIN_MIN_NEW_EVENTS:100}
    min-new-positives: ${RECOMMENDATION_AUTO_RETRAIN_MIN_NEW_POSITIVES:10}
    min-interval-days: ${RECOMMENDATION_AUTO_RETRAIN_MIN_INTERVAL_DAYS:7}
    # 워커 RECOMMENDATION_TRAINING_MIN_ROWS(기본 50)와 일치시킨다 — 미달이면 job을 만들지 않아
    # SKIPPED_LOW_DATASET 무한 재생성 루프를 막는다.
    min-rows: ${RECOMMENDATION_AUTO_RETRAIN_MIN_ROWS:50}
  # M3 drift 모니터링(일일). 기본 off. drift 스냅샷은 읽기 전용 관측이고, retrain-on-severe를 별도로
  # 켜야만 심각 PSI 시 재훈련을 트리거한다(관측과 트리거 분리 opt-in).
  drift:
    enabled: ${RECOMMENDATION_DRIFT_ENABLED:false}
    cron: "${RECOMMENDATION_DRIFT_CRON:0 50 4 * * *}"
    zone: "${RECOMMENDATION_DRIFT_ZONE:Asia/Seoul}"
    min-samples: ${RECOMMENDATION_DRIFT_MIN_SAMPLES:500}
    retrain-on-severe: ${RECOMMENDATION_DRIFT_RETRAIN_ON_SEVERE:false}

part:
  price-refresh:
    enabled: ${PART_PRICE_REFRESH_ENABLED:true}
    cron: "${PART_PRICE_REFRESH_CRON:0 0 4 * * *}"
    zone: "${PART_PRICE_REFRESH_ZONE:Asia/Seoul}"
  danawa-refresh:
    enabled: ${PART_DANAWA_REFRESH_ENABLED:false}
    cron: "${PART_DANAWA_REFRESH_CRON:0 30 4 * * *}"
    zone: "${PART_DANAWA_REFRESH_ZONE:Asia/Seoul}"
    base-url: ${PART_DANAWA_BASE_URL:https://search.danawa.com}
    rate-limit-ms: ${PART_DANAWA_RATE_LIMIT_MS:3000}
  danawa-trend-refresh:
    enabled: ${PART_DANAWA_TREND_REFRESH_ENABLED:false}
    cron: "${PART_DANAWA_TREND_REFRESH_CRON:0 30 5 1 * *}"
    zone: "${PART_DANAWA_TREND_REFRESH_ZONE:Asia/Seoul}"
    base-url: ${PART_DANAWA_TREND_BASE_URL:https://prod.danawa.com}
    search-base-url: ${PART_DANAWA_TREND_SEARCH_BASE_URL:https://search.danawa.com}
    rate-limit-ms: ${PART_DANAWA_TREND_RATE_LIMIT_MS:3000}
  manufacturer-release-intake:
    enabled: ${PART_MANUFACTURER_RELEASE_INTAKE_ENABLED:false}
    cron: "${PART_MANUFACTURER_RELEASE_INTAKE_CRON:0 0 6 * * *}"
    zone: "${PART_MANUFACTURER_RELEASE_INTAKE_ZONE:Asia/Seoul}"
    user-agent: ${PART_MANUFACTURER_RELEASE_INTAKE_USER_AGENT:BuildGraphBot/0.1}
    # 인증 없는 데모 RSS 피드(/api/demo/...) 노출 여부. 기본 false(프로덕션 안전 기본),
    # 로컬/데모 스택에서만 compose env로 켠다.
    demo-feed-enabled: ${PART_MANUFACTURER_RELEASE_DEMO_FEED_ENABLED:false}

demo:
  # 데모 시연 중 mutating 스케줄러(가격/자산 수집 4종 + M2 자동 재훈련) + 관리자 가격 Job을 일괄 동결하는 단일 스위치.
  # 주의: Python 훈련 워커는 별개 프로세스라 이 스위치가 안 먹는다 — 데모 시 RECOMMENDATION_TRAINING_WORKER_ENABLED=false 병행.
  freeze-mutations: ${DEMO_FREEZE_MUTATIONS:false}
