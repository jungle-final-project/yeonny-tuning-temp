<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" fill="none">
  <!-- scene-board.svg와 같은 좌표계의 선택 강조 레이어.
       메인보드 내부를 채우지 않고 PCB 외곽 테두리만 강조한다. -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <polygon
      points="700,220 1160,450 700,680 240,450"
      fill="none"
      stroke="#60a5fa"
      stroke-width="5"
      opacity="0.9"
    />
    <polyline
      points="240,450 700,220 1160,450"
      fill="none"
      stroke="#bfdbfe"
      stroke-width="2.5"
      opacity="0.86"
    />
    <polyline
      points="240,450 700,680 1160,450"
      fill="none"
      stroke="#2563eb"
      stroke-width="2.5"
      opacity="0.58"
    />
    <polyline
      points="240,458 700,688 1160,458"
      fill="none"
      stroke="#1d4ed8"
      stroke-width="2"
      opacity="0.44"
    />
  </g>
</svg>
