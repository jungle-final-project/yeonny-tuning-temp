<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 220" fill="none">
  <!-- 타워형 CPU 쿨러: 핀 스택 + 히트파이프 + 측면 팬 -->
  <!-- 팬은 [투영 g > 원형 좌표 fan-spin g] 중첩 구조: CSS 회전은 내부 그룹에만 건다 -->
  <!-- idle 모션은 opt-in: reduced-motion 환경(또는 미디어쿼리 미전파)에서는 정지 상태로 남는다 -->
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .fan-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: fan-spin 4.2s linear infinite;
      }
      @keyframes fan-spin {
        to { transform: rotate(360deg); }
      }
    }
  </style>
  <defs>
    <linearGradient id="coolerFinTop" x1="70" y1="40" x2="218" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8eef7"/>
      <stop offset="100%" stop-color="#ccd7e6"/>
    </linearGradient>
    <linearGradient id="coolerFinLeft" x1="70" y1="70" x2="158" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#aebfd6"/>
      <stop offset="100%" stop-color="#91a3bc"/>
    </linearGradient>
    <linearGradient id="heatpipeA" x1="88" y1="76" x2="108" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="heatpipeB" x1="152" y1="76" x2="176" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="55%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="coolerBlade" x1="0" y1="-26" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#41526b"/>
      <stop offset="100%" stop-color="#2e3c50"/>
    </linearGradient>
  </defs>
  <!-- 베이스 플레이트 -->
  <polygon points="130,168 198,202 130,236 62,202" fill="#94a3b8" transform="translate(0,-30)"/>
  <polygon points="130,168 198,202 130,236 62,202" fill="#64748b" opacity="0.4" transform="translate(0,-26)"/>
  <!-- 히트파이프 (구리 그라디언트) -->
  <path d="M96 176 C 84 150 88 96 108 76" stroke="url(#heatpipeA)" stroke-width="7" stroke-linecap="round"/>
  <path d="M150 190 C 172 158 176 100 152 76" stroke="url(#heatpipeB)" stroke-width="7" stroke-linecap="round"/>
  <path d="M95 172 C 85 150 89 98 107 79" stroke="#fde68a" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <path d="M149 186 C 169 158 173 102 151 79" stroke="#fcd34d" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <!-- 핀 스택 (본체) -->
  <polygon points="130,40 218,84 158,114 70,70" fill="url(#coolerFinTop)"/>
  <polygon points="70,70 158,114 158,184 70,140" fill="url(#coolerFinLeft)"/>
  <polygon points="218,84 158,114 158,184 218,154" fill="#c3cfdf"/>
  <polygon points="130,40 218,84 158,114 70,70" stroke="#8ea1bb" stroke-width="1.4"/>
  <polyline points="70,70 130,40 218,84" stroke="#f4f8fd" stroke-width="1.3" opacity="0.9"/>
  <!-- 핀 줄무늬 -->
  <g stroke="#7d92af" stroke-width="1.6">
    <line x1="70" y1="82" x2="158" y2="126"/><line x1="70" y1="94" x2="158" y2="138"/>
    <line x1="70" y1="106" x2="158" y2="150"/><line x1="70" y1="118" x2="158" y2="162"/>
    <line x1="70" y1="130" x2="158" y2="174"/>
  </g>
  <g stroke="#c8d5e6" stroke-width="0.8" opacity="0.9">
    <line x1="70" y1="80" x2="158" y2="124"/><line x1="70" y1="92" x2="158" y2="136"/>
    <line x1="70" y1="104" x2="158" y2="148"/><line x1="70" y1="116" x2="158" y2="160"/>
    <line x1="70" y1="128" x2="158" y2="172"/>
  </g>
  <g stroke="#a9b9cd" stroke-width="1.6">
    <line x1="218" y1="96" x2="158" y2="126"/><line x1="218" y1="108" x2="158" y2="138"/>
    <line x1="218" y1="120" x2="158" y2="150"/><line x1="218" y1="132" x2="158" y2="162"/>
    <line x1="218" y1="144" x2="158" y2="174"/>
  </g>
  <!-- 측면 팬 (좌측 면 부착) -->
  <g transform="translate(104,128) rotate(-26) scale(1,0.882)">
    <circle r="34" fill="#1e293b"/>
    <circle r="27" fill="#0f172a"/>
    <circle r="25.8" fill="none" stroke="#33415c" stroke-width="1.4"/>
    <g class="fan-spin">
      <circle r="24" fill="none"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)" transform="rotate(51.43)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)" transform="rotate(102.86)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)" transform="rotate(154.29)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)" transform="rotate(205.71)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)" transform="rotate(257.14)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#coolerBlade)" transform="rotate(308.57)"/>
    </g>
    <circle r="7" fill="#475569"/>
    <circle r="7" fill="none" stroke="#5b6b83" stroke-width="1"/>
    <circle cx="-2" cy="-2" r="2.2" fill="#64748b"/>
  </g>
</svg>
