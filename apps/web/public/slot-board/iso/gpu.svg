<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" fill="none">
  <!-- 그래픽카드: 듀얼 팬 슈라우드 + 백플레이트 + PCIe 핑거 -->
  <!-- 팬은 [투영 g > 원형 좌표 fan-spin g] 중첩 구조: CSS 회전은 내부 그룹에만 건다 -->
  <!-- idle 모션은 opt-in: reduced-motion 환경(또는 미디어쿼리 미전파)에서는 정지 상태로 남는다 -->
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .fan-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: fan-spin 3.2s linear infinite;
      }
      .fan-spin--b {
        animation-duration: 3.6s;
        animation-delay: -1.2s;
      }
      .gpu-led {
        animation: led-breathe 3.2s ease-in-out infinite;
      }
      @keyframes fan-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes led-breathe {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
    }
  </style>
  <defs>
    <linearGradient id="gpuShroud" x1="18" y1="76" x2="350" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38455b"/>
      <stop offset="45%" stop-color="#2b3648"/>
      <stop offset="100%" stop-color="#222c3c"/>
    </linearGradient>
    <linearGradient id="gpuBlade" x1="0" y1="-30" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#42536d"/>
      <stop offset="100%" stop-color="#2f3d52"/>
    </linearGradient>
  </defs>
  <!-- 카드 본체 -->
  <polygon points="90,40 350,170 278,206 18,76" fill="url(#gpuShroud)"/>
  <polygon points="18,76 278,206 278,222 18,92" fill="#0f172a"/>
  <polygon points="350,170 278,206 278,222 350,186" fill="#1c2534"/>
  <polygon points="90,40 350,170 278,206 18,76" stroke="#455368" stroke-width="1.6"/>
  <!-- 슈라우드 상단 모서리 하이라이트 -->
  <polyline points="18,76 90,40 350,170" stroke="#5f7291" stroke-width="1.4" opacity="0.9"/>
  <!-- 슈라우드 벤트 슬릿 (팬 사이) -->
  <g stroke="#1c2736" stroke-width="2.2" opacity="0.85">
    <line x1="178" y1="112" x2="196" y2="103"/>
    <line x1="188" y1="118" x2="206" y2="109"/>
    <line x1="198" y1="124" x2="216" y2="115"/>
  </g>
  <!-- 슈라우드 액센트 LED 라인 (idle breathe 대상) -->
  <g class="gpu-led">
    <polyline points="58,56 318,186" stroke="#3b82f6" stroke-width="3" opacity="0.9"/>
    <polyline points="58,56 318,186" stroke="#93c5fd" stroke-width="1.2" opacity="0.8"/>
  </g>
  <!-- 팬 1 -->
  <g transform="translate(134,98) rotate(27) scale(1,0.525)">
    <circle r="40" fill="#111827"/>
    <circle r="33" fill="#1e293b"/>
    <circle r="31.5" fill="none" stroke="#334155" stroke-width="1.6"/>
    <g class="fan-spin">
      <circle r="30" fill="none"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(51.43)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(102.86)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(154.29)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(205.71)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(257.14)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(308.57)"/>
    </g>
    <circle r="9" fill="#475569"/>
    <circle r="9" fill="none" stroke="#5b6b83" stroke-width="1.2"/>
    <circle cx="-2.5" cy="-2.5" r="3" fill="#64748b"/>
  </g>
  <!-- 팬 2 -->
  <g transform="translate(246,154) rotate(27) scale(1,0.525)">
    <circle r="40" fill="#111827"/>
    <circle r="33" fill="#1e293b"/>
    <circle r="31.5" fill="none" stroke="#334155" stroke-width="1.6"/>
    <g class="fan-spin fan-spin--b">
      <circle r="30" fill="none"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(26)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(77.43)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(128.86)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(180.29)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(231.71)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(283.14)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#gpuBlade)" transform="rotate(334.57)"/>
    </g>
    <circle r="9" fill="#475569"/>
    <circle r="9" fill="none" stroke="#5b6b83" stroke-width="1.2"/>
    <circle cx="-2.5" cy="-2.5" r="3" fill="#64748b"/>
  </g>
  <!-- PCIe 골드 핑거 (하단 좌측면) -->
  <g stroke="#d97706" stroke-width="3.4">
    <line x1="66" y1="102" x2="66" y2="114"/><line x1="80" y1="109" x2="80" y2="121"/>
    <line x1="94" y1="116" x2="94" y2="128"/><line x1="108" y1="123" x2="108" y2="135"/>
    <line x1="122" y1="130" x2="122" y2="142"/><line x1="136" y1="137" x2="136" y2="149"/>
    <line x1="150" y1="144" x2="150" y2="156"/><line x1="164" y1="151" x2="164" y2="163"/>
  </g>
  <g stroke="#fbbf24" stroke-width="1.1" opacity="0.7">
    <line x1="65" y1="102" x2="65" y2="114"/><line x1="79" y1="109" x2="79" y2="121"/>
    <line x1="93" y1="116" x2="93" y2="128"/><line x1="107" y1="123" x2="107" y2="135"/>
    <line x1="121" y1="130" x2="121" y2="142"/><line x1="135" y1="137" x2="135" y2="149"/>
    <line x1="149" y1="144" x2="149" y2="156"/><line x1="163" y1="151" x2="163" y2="163"/>
  </g>
  <!-- 보조전원 커넥터 -->
  <polygon points="300,150 324,162 312,168 288,156" fill="#0f172a" stroke="#455368" stroke-width="1.2"/>
  <g fill="#1e293b">
    <polygon points="298,153 304,156 300,158 294,155"/>
    <polygon points="306,157 312,160 308,162 302,159"/>
  </g>
</svg>
