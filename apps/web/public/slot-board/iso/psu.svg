<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <!-- 파워서플라이: 상단 팬 그릴 + 모듈러 케이블 포트 -->
  <defs>
    <linearGradient id="psuBody" x1="20" y1="95" x2="290" y2="175" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3d4d63"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#293648"/>
    </linearGradient>
    <linearGradient id="psuLabel" x1="52" y1="130" x2="128" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#243043"/>
      <stop offset="100%" stop-color="#17202e"/>
    </linearGradient>
  </defs>
  <!-- 본체 -->
  <polygon points="130,40 290,120 180,175 20,95" fill="url(#psuBody)"/>
  <polygon points="20,95 180,175 180,233 20,153" fill="#0f172a"/>
  <polygon points="290,120 180,175 180,233 290,178" fill="#1e293b"/>
  <polygon points="130,40 290,120 180,175 20,95" stroke="#475569" stroke-width="1.6"/>
  <polyline points="20,95 130,40 290,120" stroke="#64748b" stroke-width="1.3" opacity="0.9"/>
  <!-- 상단 팬 그릴 -->
  <g transform="translate(156,108) rotate(27) scale(1,0.523)">
    <circle r="44" fill="#1e293b"/>
    <circle r="36" fill="#0f172a"/>
    <g stroke="#475569" stroke-width="2" fill="none">
      <circle r="28"/>
      <circle r="18"/>
      <circle r="9"/>
    </g>
    <!-- 그릴 방사 스트럿 -->
    <g stroke="#3b4a61" stroke-width="1.8">
      <line x1="0" y1="-34" x2="0" y2="34"/>
      <line x1="-34" y1="0" x2="34" y2="0"/>
      <line x1="-24" y1="-24" x2="24" y2="24"/>
      <line x1="-24" y1="24" x2="24" y2="-24"/>
    </g>
    <circle r="7" fill="#64748b"/>
    <circle cx="-2" cy="-2" r="2" fill="#94a3b8"/>
  </g>
  <!-- 사양 라벨 (좌측면) -->
  <polygon points="52,130 128,168 128,196 52,158" fill="url(#psuLabel)"/>
  <polygon points="52,130 128,168 128,170 52,132" fill="#3b4a61"/>
  <polyline points="62,146 118,174" stroke="#93c5fd" stroke-width="3"/>
  <polyline points="62,154 104,175" stroke="#64748b" stroke-width="2.4"/>
  <!-- 80PLUS 배지 느낌 점 -->
  <circle cx="116" cy="188" r="3.4" fill="#f59e0b" opacity="0.9"/>
  <!-- 모듈러 포트 (우측면) -->
  <g fill="#0b1220" stroke="#475569" stroke-width="1.2">
    <polygon points="204,186 228,174 228,188 204,200"/>
    <polygon points="236,170 260,158 260,172 236,184"/>
  </g>
  <g fill="#1e293b">
    <polygon points="208,186 216,182 216,190 208,194"/>
    <polygon points="240,170 248,166 248,174 240,178"/>
  </g>
  <!-- 전원 스위치 -->
  <circle cx="268" cy="150" r="5" fill="#d97706"/>
  <circle cx="266.8" cy="148.8" r="1.6" fill="#fde68a"/>
</svg>
