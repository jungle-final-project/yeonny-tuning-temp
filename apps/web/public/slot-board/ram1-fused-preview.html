<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAM1 fused preview</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f6f7f9;
      }

      body {
        display: grid;
        place-items: center;
      }

      .stage {
        position: relative;
        width: min(100vw, 1672px);
        aspect-ratio: 1672 / 941;
      }

      .stage img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        user-select: none;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="RAM1 fused preview">
      <img src="/slot-board/backgrounds/dependency-plate-before.png" alt="" />
      <img src="/slot-board/parts/ram1-fused-overlay.png" alt="" />
    </main>
  </body>
</html>
