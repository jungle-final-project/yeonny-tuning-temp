<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 150" fill="none">
  <!-- SSD (iso-hd): M.2 NVMe 스틱 + 컨트롤러/낸드 칩 + 골드 핑거 + 고정 나사. -->
  <!-- 본체·칩·핑거 좌표는 iso/ssd.svg와 동일 -->
  <defs>
    <linearGradient id="hdSsdPcb" x1="20" y1="50" x2="220" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2c4d7c"/>
      <stop offset="55%" stop-color="#213f66"/>
      <stop offset="100%" stop-color="#152a49"/>
    </linearGradient>
    <linearGradient id="hdSsdPcbL" x1="20" y1="50" x2="180" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#122340"/>
      <stop offset="100%" stop-color="#0d1c34"/>
    </linearGradient>
    <linearGradient id="hdSsdChip" x1="68" y1="52" x2="180" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#232f43"/>
      <stop offset="100%" stop-color="#0a111e"/>
    </linearGradient>
  </defs>
  <polygon points="60,30 220,110 180,130 20,50" fill="url(#hdSsdPcb)"/>
  <polygon points="20,50 180,130 180,136 20,56" fill="url(#hdSsdPcbL)"/>
  <polygon points="220,110 180,130 180,136 220,116" fill="#1a3050"/>
  <polygon points="60,30 220,110 180,130 20,50" stroke="#3d6098" stroke-width="1.4"/>
  <polyline points="20,50 60,30 220,110" stroke="#6488bd" stroke-width="1" opacity="0.95"/>
  <!-- 컨트롤러 + 낸드 칩 (윗면 + 얇은 측벽) -->
  <polygon points="92,52 132,72 108,84 68,64" fill="url(#hdSsdChip)"/>
  <polygon points="68,64 108,84 108,88 68,68" fill="#080e18"/>
  <polygon points="140,78 180,98 156,110 116,90" fill="url(#hdSsdChip)"/>
  <polygon points="116,90 156,110 156,114 116,94" fill="#080e18"/>
  <polygon points="92,52 132,72 108,84 68,64" stroke="#42536b" stroke-width="1"/>
  <polygon points="140,78 180,98 156,110 116,90" stroke="#42536b" stroke-width="1"/>
  <polyline points="68,64 92,52 132,72" stroke="#55647d" stroke-width="0.9" opacity="0.95"/>
  <polyline points="116,90 140,78 180,98" stroke="#55647d" stroke-width="0.9" opacity="0.95"/>
  <!-- 칩 각인 -->
  <polyline points="84,63 108,75" stroke="#475569" stroke-width="1.6" opacity="0.9"/>
  <polyline points="132,89 156,101" stroke="#475569" stroke-width="1.6" opacity="0.9"/>
  <!-- 라벨 스트립 -->
  <polyline points="86,74 122,92" stroke="#93c5fd" stroke-width="2.6"/>
  <polyline points="90,79 116,92" stroke="#64748b" stroke-width="1.8" opacity="0.85"/>
  <!-- 골드 핑거 (좌측 끝) -->
  <g stroke="#c98a05" stroke-width="2.6">
    <line x1="34" y1="42" x2="46" y2="48"/>
    <line x1="30" y1="48" x2="42" y2="54"/>
    <line x1="26" y1="54" x2="38" y2="60"/>
  </g>
  <g stroke="#fcd34d" stroke-width="0.9" opacity="0.8">
    <line x1="34" y1="41" x2="46" y2="47"/>
    <line x1="30" y1="47" x2="42" y2="53"/>
    <line x1="26" y1="53" x2="38" y2="59"/>
  </g>
  <!-- 고정 나사 홈 (우측 끝) -->
  <circle cx="204" cy="116" r="5" fill="#0d1524" stroke="#5c7bb0" stroke-width="1.4"/>
  <line x1="201" y1="114" x2="207" y2="118" stroke="#6b8ac0" stroke-width="1.2"/>
</svg>
