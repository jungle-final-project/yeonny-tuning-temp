<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 220" fill="none">
  <!-- 쿨러 (iso-hd): 타워형 CPU 쿨러. 알루미늄 핀 스택 + 구리 히트파이프 + 측면 팬. -->
  <!-- 핀 스택·히트파이프·팬 중심(104,128) 좌표는 iso/cooler.svg와 동일 -->
  <!-- 팬: [투영 g > 원형 좌표 fan-spin g] 중첩. idle 모션은 reduced-motion에서 정지. -->
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .fan-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: fan-spin 4.2s linear infinite;
      }
      @keyframes fan-spin {
        to { transform: rotate(360deg); }
      }
    }
  </style>
  <defs>
    <linearGradient id="hdFinTop" x1="70" y1="40" x2="218" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f2f6fb"/>
      <stop offset="55%" stop-color="#dbe4f0"/>
      <stop offset="100%" stop-color="#c2cee0"/>
    </linearGradient>
    <linearGradient id="hdFinLeft" x1="70" y1="70" x2="158" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b6c6dc"/>
      <stop offset="100%" stop-color="#8698b2"/>
    </linearGradient>
    <linearGradient id="hdFinRight" x1="218" y1="84" x2="158" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ccd7e6"/>
      <stop offset="100%" stop-color="#aebccf"/>
    </linearGradient>
    <linearGradient id="hdPipeA" x1="88" y1="76" x2="108" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="45%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#8a3d0e"/>
    </linearGradient>
    <linearGradient id="hdPipeB" x1="152" y1="76" x2="176" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="hdCoolerBlade" x1="0" y1="-26" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#49596f"/>
      <stop offset="100%" stop-color="#2e3c50"/>
    </linearGradient>
    <radialGradient id="hdCoolerHub" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#647488"/>
      <stop offset="100%" stop-color="#3a475c"/>
    </radialGradient>
  </defs>
  <!-- 베이스 플레이트 -->
  <polygon points="130,168 198,202 130,236 62,202" fill="#94a3b8" transform="translate(0,-30)"/>
  <polygon points="130,168 198,202 130,236 62,202" fill="#647488" opacity="0.4" transform="translate(0,-26)"/>
  <!-- 히트파이프 (구리 그라디언트 + 하이라이트) -->
  <path d="M96 176 C 84 150 88 96 108 76" stroke="url(#hdPipeA)" stroke-width="7" stroke-linecap="round"/>
  <path d="M150 190 C 172 158 176 100 152 76" stroke="url(#hdPipeB)" stroke-width="7" stroke-linecap="round"/>
  <path d="M95 172 C 85 150 89 98 107 79" stroke="#fef08a" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <path d="M149 186 C 169 158 173 102 151 79" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>
  <!-- 핀 스택 (윗면 + 좌/우 측면) -->
  <polygon points="130,40 218,84 158,114 70,70" fill="url(#hdFinTop)"/>
  <polygon points="70,70 158,114 158,184 70,140" fill="url(#hdFinLeft)"/>
  <polygon points="218,84 158,114 158,184 218,154" fill="url(#hdFinRight)"/>
  <polygon points="130,40 218,84 158,114 70,70" stroke="#8ea1bb" stroke-width="1.4"/>
  <polyline points="70,70 130,40 218,84" stroke="#f8fbff" stroke-width="1.4" opacity="0.95"/>
  <!-- 핀 줄무늬 (좌측면) -->
  <g stroke="#7a90ae" stroke-width="1.6">
    <line x1="70" y1="82" x2="158" y2="126"/><line x1="70" y1="94" x2="158" y2="138"/>
    <line x1="70" y1="106" x2="158" y2="150"/><line x1="70" y1="118" x2="158" y2="162"/>
    <line x1="70" y1="130" x2="158" y2="174"/>
  </g>
  <g stroke="#d3dfee" stroke-width="0.8" opacity="0.95">
    <line x1="70" y1="80" x2="158" y2="124"/><line x1="70" y1="92" x2="158" y2="136"/>
    <line x1="70" y1="104" x2="158" y2="148"/><line x1="70" y1="116" x2="158" y2="160"/>
    <line x1="70" y1="128" x2="158" y2="172"/>
  </g>
  <!-- 핀 줄무늬 (우측면) -->
  <g stroke="#9aabc0" stroke-width="1.6">
    <line x1="218" y1="96" x2="158" y2="126"/><line x1="218" y1="108" x2="158" y2="138"/>
    <line x1="218" y1="120" x2="158" y2="150"/><line x1="218" y1="132" x2="158" y2="162"/>
    <line x1="218" y1="144" x2="158" y2="174"/>
  </g>
  <!-- 측면 팬 (좌측 면 부착, idle spin) -->
  <g transform="translate(104,128) rotate(-26) scale(1,0.882)">
    <circle r="34" fill="#1b2536"/>
    <circle r="27" fill="#0d1524"/>
    <circle r="25.8" fill="none" stroke="#38455c" stroke-width="1.4"/>
    <g class="fan-spin">
      <circle r="24" fill="none"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)" transform="rotate(51.43)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)" transform="rotate(102.86)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)" transform="rotate(154.29)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)" transform="rotate(205.71)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)" transform="rotate(257.14)"/>
      <path d="M1.2 -7 C 8 -9 15 -16 16 -23 C 10 -24 2 -19 -1 -8 Z" fill="url(#hdCoolerBlade)" transform="rotate(308.57)"/>
    </g>
    <circle r="7" fill="url(#hdCoolerHub)"/>
    <circle r="7" fill="none" stroke="#5f6f88" stroke-width="1"/>
    <circle cx="-2" cy="-2" r="2.2" fill="#7a8aa2"/>
  </g>
</svg>
