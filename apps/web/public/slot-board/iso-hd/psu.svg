<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" fill="none">
  <!-- PSU (iso-hd): 파워서플라이. 상단 팬 그릴 + 사양 라벨 + 모듈러 포트 + 스위치. -->
  <!-- 본체·팬 그릴·포트 좌표는 iso/psu.svg와 동일 -->
  <defs>
    <linearGradient id="hdPsuBody" x1="20" y1="95" x2="290" y2="175" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#46586f"/>
      <stop offset="50%" stop-color="#35475d"/>
      <stop offset="100%" stop-color="#263346"/>
    </linearGradient>
    <linearGradient id="hdPsuBodyL" x1="20" y1="95" x2="180" y2="233" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1524"/>
      <stop offset="100%" stop-color="#080f1b"/>
    </linearGradient>
    <linearGradient id="hdPsuBodyR" x1="290" y1="120" x2="180" y2="233" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#212d40"/>
      <stop offset="100%" stop-color="#151f2e"/>
    </linearGradient>
    <linearGradient id="hdPsuLabel" x1="52" y1="130" x2="128" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#28344a"/>
      <stop offset="100%" stop-color="#141d2b"/>
    </linearGradient>
    <radialGradient id="hdPsuGrill" cx="42%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#26334a"/>
      <stop offset="100%" stop-color="#0c1421"/>
    </radialGradient>
  </defs>
  <!-- 본체 (윗면 + 두께 2면) -->
  <polygon points="130,40 290,120 180,175 20,95" fill="url(#hdPsuBody)"/>
  <polygon points="20,95 180,175 180,233 20,153" fill="url(#hdPsuBodyL)"/>
  <polygon points="290,120 180,175 180,233 290,178" fill="url(#hdPsuBodyR)"/>
  <polygon points="130,40 290,120 180,175 20,95" stroke="#4c5b72" stroke-width="1.6"/>
  <polyline points="20,95 130,40 290,120" stroke="#6b7c95" stroke-width="1.3" opacity="0.95"/>
  <!-- 상단 팬 그릴 -->
  <g transform="translate(156,108) rotate(27) scale(1,0.523)">
    <circle r="44" fill="#1b2536"/>
    <circle r="36" fill="url(#hdPsuGrill)"/>
    <g stroke="#4c5b72" stroke-width="2" fill="none">
      <circle r="28"/>
      <circle r="18"/>
      <circle r="9"/>
    </g>
    <!-- 그릴 방사 스트럿 -->
    <g stroke="#38455c" stroke-width="1.8">
      <line x1="0" y1="-34" x2="0" y2="34"/>
      <line x1="-34" y1="0" x2="34" y2="0"/>
      <line x1="-24" y1="-24" x2="24" y2="24"/>
      <line x1="-24" y1="24" x2="24" y2="-24"/>
    </g>
    <g stroke="#5c6b83" stroke-width="0.7" opacity="0.7">
      <line x1="0" y1="-34" x2="0" y2="34"/>
      <line x1="-34" y1="0" x2="34" y2="0"/>
    </g>
    <circle r="7" fill="#647488"/>
    <circle cx="-2" cy="-2" r="2" fill="#9aa9c0"/>
  </g>
  <!-- 사양 라벨 (좌측면) -->
  <polygon points="52,130 128,168 128,196 52,158" fill="url(#hdPsuLabel)"/>
  <polygon points="52,130 128,168 128,170 52,132" fill="#42536b"/>
  <polyline points="62,146 118,174" stroke="#93c5fd" stroke-width="3"/>
  <polyline points="62,154 104,175" stroke="#64748b" stroke-width="2.4"/>
  <!-- 80PLUS 배지 점 -->
  <circle cx="116" cy="188" r="3.4" fill="#eab308" opacity="0.95"/>
  <circle cx="115" cy="187" r="1.1" fill="#fef08a" opacity="0.85"/>
  <!-- 모듈러 포트 (우측면) -->
  <g fill="#080f1b" stroke="#4c5b72" stroke-width="1.2">
    <polygon points="204,186 228,174 228,188 204,200"/>
    <polygon points="236,170 260,158 260,172 236,184"/>
  </g>
  <g fill="#212d40">
    <polygon points="208,186 216,182 216,190 208,194"/>
    <polygon points="240,170 248,166 248,174 240,178"/>
  </g>
  <!-- 전원 스위치 -->
  <circle cx="268" cy="150" r="5" fill="#c98a05"/>
  <circle cx="266.8" cy="148.8" r="1.6" fill="#fef08a"/>
</svg>
