<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240" fill="none">
  <!-- GPU (iso-hd): 듀얼팬 그래픽카드. 슈라우드 다층 + 벤트 + 스페큘러 + LED 라인. -->
  <!-- 본체 꼭짓점(90,40)(350,170)(278,206)(18,76), 팬 중심(134,98)(246,154), PCIe 핑거 좌표는 iso/gpu.svg와 동일 -->
  <!-- idle 모션은 opt-in: reduced-motion 환경에서는 정지 상태로 남는다 -->
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .fan-spin {
        transform-box: fill-box;
        transform-origin: center;
        animation: fan-spin 3.2s linear infinite;
      }
      .fan-spin--b {
        animation-duration: 3.6s;
        animation-delay: -1.2s;
      }
      .gpu-led {
        animation: led-breathe 3.2s ease-in-out infinite;
      }
      @keyframes fan-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes led-breathe {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    }
  </style>
  <defs>
    <linearGradient id="hdGpuShroud" x1="30" y1="66" x2="344" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3f4d64"/>
      <stop offset="40%" stop-color="#303c50"/>
      <stop offset="100%" stop-color="#1f2938"/>
    </linearGradient>
    <linearGradient id="hdGpuShroudL" x1="18" y1="76" x2="278" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111a2b"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="hdGpuShroudR" x1="350" y1="170" x2="278" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#232e40"/>
      <stop offset="100%" stop-color="#161f2e"/>
    </linearGradient>
    <linearGradient id="hdGpuBlade" x1="0" y1="-30" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a5c78"/>
      <stop offset="100%" stop-color="#2c3a4f"/>
    </linearGradient>
    <radialGradient id="hdGpuHub" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#3a475c"/>
    </radialGradient>
    <linearGradient id="hdGpuSpec" x1="30" y1="52" x2="200" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7d90ae" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7d90ae" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 카드 본체 (윗면 + 두께 2면) -->
  <polygon points="90,40 350,170 278,206 18,76" fill="url(#hdGpuShroud)"/>
  <polygon points="18,76 278,206 278,222 18,92" fill="url(#hdGpuShroudL)"/>
  <polygon points="350,170 278,206 278,222 350,186" fill="url(#hdGpuShroudR)"/>
  <polygon points="90,40 350,170 278,206 18,76" stroke="#4c5b72" stroke-width="1.6"/>
  <!-- 상단 모서리 rim-light + specular 워시 -->
  <polyline points="18,76 90,40 350,170" stroke="#68809f" stroke-width="1.4" opacity="0.95"/>
  <polygon points="60,54 214,131 196,141 42,64" fill="url(#hdGpuSpec)" opacity="0.35"/>
  <!-- 슈라우드 벤트 슬릿 (팬 사이) -->
  <g stroke="#151f2d" stroke-width="2.2" opacity="0.9">
    <line x1="178" y1="112" x2="196" y2="103"/>
    <line x1="188" y1="118" x2="206" y2="109"/>
    <line x1="198" y1="124" x2="216" y2="115"/>
  </g>
  <g stroke="#4a5a72" stroke-width="0.8" opacity="0.7">
    <line x1="178" y1="110.5" x2="196" y2="101.5"/>
    <line x1="188" y1="116.5" x2="206" y2="107.5"/>
    <line x1="198" y1="122.5" x2="216" y2="113.5"/>
  </g>
  <!-- 슈라우드 액센트 LED 라인 (idle breathe) -->
  <g class="gpu-led">
    <polyline points="58,56 318,186" stroke="#3b82f6" stroke-width="3.2" opacity="0.9"/>
    <polyline points="58,56 318,186" stroke="#bfdbfe" stroke-width="1.1" opacity="0.85"/>
  </g>
  <!-- 팬 1 -->
  <g transform="translate(134,98) rotate(27) scale(1,0.525)">
    <circle r="40" fill="#0d1524"/>
    <circle r="33" fill="#1b2536"/>
    <circle r="31.5" fill="none" stroke="#38455c" stroke-width="1.6"/>
    <circle r="31.5" fill="none" stroke="#0a1120" stroke-width="0.8" opacity="0.7"/>
    <g class="fan-spin">
      <circle r="30" fill="none"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(51.43)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(102.86)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(154.29)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(205.71)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(257.14)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(308.57)"/>
    </g>
    <circle r="9" fill="url(#hdGpuHub)"/>
    <circle r="9" fill="none" stroke="#5f6f88" stroke-width="1.2"/>
    <circle cx="-2.5" cy="-2.5" r="3" fill="#7a8aa2"/>
  </g>
  <!-- 팬 2 -->
  <g transform="translate(246,154) rotate(27) scale(1,0.525)">
    <circle r="40" fill="#0d1524"/>
    <circle r="33" fill="#1b2536"/>
    <circle r="31.5" fill="none" stroke="#38455c" stroke-width="1.6"/>
    <circle r="31.5" fill="none" stroke="#0a1120" stroke-width="0.8" opacity="0.7"/>
    <g class="fan-spin fan-spin--b">
      <circle r="30" fill="none"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(26)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(77.43)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(128.86)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(180.29)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(231.71)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(283.14)"/>
      <path d="M1.5 -8 C 10 -10 18 -18 19 -28 C 12 -29 3 -23 -1 -9 Z" fill="url(#hdGpuBlade)" transform="rotate(334.57)"/>
    </g>
    <circle r="9" fill="url(#hdGpuHub)"/>
    <circle r="9" fill="none" stroke="#5f6f88" stroke-width="1.2"/>
    <circle cx="-2.5" cy="-2.5" r="3" fill="#7a8aa2"/>
  </g>
  <!-- PCIe 골드 핑거 (하단 좌측면) -->
  <g stroke="#c98a05" stroke-width="3.4">
    <line x1="66" y1="102" x2="66" y2="114"/><line x1="80" y1="109" x2="80" y2="121"/>
    <line x1="94" y1="116" x2="94" y2="128"/><line x1="108" y1="123" x2="108" y2="135"/>
    <line x1="122" y1="130" x2="122" y2="142"/><line x1="136" y1="137" x2="136" y2="149"/>
    <line x1="150" y1="144" x2="150" y2="156"/><line x1="164" y1="151" x2="164" y2="163"/>
  </g>
  <g stroke="#fcd34d" stroke-width="1.1" opacity="0.75">
    <line x1="65" y1="102" x2="65" y2="114"/><line x1="79" y1="109" x2="79" y2="121"/>
    <line x1="93" y1="116" x2="93" y2="128"/><line x1="107" y1="123" x2="107" y2="135"/>
    <line x1="121" y1="130" x2="121" y2="142"/><line x1="135" y1="137" x2="135" y2="149"/>
    <line x1="149" y1="144" x2="149" y2="156"/><line x1="163" y1="151" x2="163" y2="163"/>
  </g>
  <!-- 보조전원 커넥터 (윗면 우측) -->
  <polygon points="300,150 324,162 312,168 288,156" fill="#0d1524" stroke="#4c5b72" stroke-width="1.2"/>
  <g fill="#1e293b">
    <polygon points="298,153 304,156 300,158 294,155"/>
    <polygon points="306,157 312,160 308,162 302,159"/>
  </g>
</svg>
