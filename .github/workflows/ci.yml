name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  verify:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate OpenAPI YAML
        run: |
          python -m pip install -r tools/requirements.txt
          python tools/validate_openapi.py

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Build web
        working-directory: apps/web
        run: npm run build

      - name: Run web route smoke tests
        working-directory: apps/web
        run: npm run test

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run API tests
        working-directory: apps/api
        run: ./gradlew test --no-daemon

      - name: Build API
        working-directory: apps/api
        run: ./gradlew bootJar --no-daemon

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build API Docker image
        run: docker build -t buildgraph-api:ci ./apps/api

      - name: Build web Docker image
        run: docker build -t buildgraph-web:ci ./apps/web

      - name: Run API runtime smoke test
        shell: bash
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/buildgraph
          SPRING_DATASOURCE_USERNAME: buildgraph
          SPRING_DATASOURCE_PASSWORD: buildgraph
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_RABBITMQ_HOST: localhost
          SPRING_RABBITMQ_USERNAME: buildgraph
          SPRING_RABBITMQ_PASSWORD: buildgraph
          SPRING_MAIL_HOST: localhost
          SPRING_MAIL_PORT: 1025
        run: |
          set -euo pipefail
          docker compose up -d postgres redis rabbitmq mailpit

          POSTGRES_READY=0
          for attempt in {1..60}; do
            if docker compose exec -T postgres pg_isready -U buildgraph -d buildgraph; then
              POSTGRES_READY=1
              break
            fi
            sleep 2
          done
          if [ "$POSTGRES_READY" -ne 1 ]; then
            docker compose logs postgres
            exit 1
          fi

          API_JAR="$(ls apps/api/build/libs/*.jar | head -n 1)"
          java -jar "$API_JAR" > api-smoke.log 2>&1 &
          API_PID=$!

          cleanup() {
            kill "$API_PID" 2>/dev/null || true
            docker compose down -v
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl -fsS http://localhost:8080/api/health; then
              exit 0
            fi
            if ! kill -0 "$API_PID" 2>/dev/null; then
              cat api-smoke.log
              exit 1
            fi
            sleep 2
          done

          cat api-smoke.log
          exit 1

  ai-live-quality:
    name: AS Chat live AI quality benchmark
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AS Chat profile benchmark
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.5
          OPENAI_REASONING_EFFORT: medium
          AS_CHAT_DEFAULT_PROFILE: AS_CHAT_FAST
          AS_CHAT_FAST_MODEL: gpt-5.5
          AS_CHAT_FAST_REASONING_EFFORT: low
          AS_CHAT_NANO_FAST_MODEL: gpt-5.4-nano
          AS_CHAT_NANO_FAST_REASONING_EFFORT: low
          AS_CHAT_BALANCED_MODEL: gpt-5.5
          AS_CHAT_BALANCED_REASONING_EFFORT: medium
          AS_CHAT_HIGH_QUALITY_MODEL: gpt-5.5
          AS_CHAT_HIGH_QUALITY_REASONING_EFFORT: high
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is not configured; skipping live AI benchmark."
            exit 0
          fi

          docker compose up -d --build postgres redis rabbitmq mailpit api
          cleanup() {
            docker compose down -v
          }
          trap cleanup EXIT

          for attempt in {1..90}; do
            if curl -fsS http://localhost:8080/api/health; then
              break
            fi
            if [ "$attempt" -eq 90 ]; then
              docker compose logs api
              exit 1
            fi
            sleep 2
          done

          python tools/benchmark_as_chat_profiles.py

      - name: Upload AS Chat benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: as-chat-profile-benchmark
          path: docs/reports/as-chat-profile-benchmark-*.md
          if-no-files-found: ignore
