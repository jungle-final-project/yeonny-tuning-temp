name: Publish Green API Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "infra/nginx/api.conf"
      - "compose.api.ecr.prod.yaml"
      - "tools/test_validate_green_deployment.py"
      - ".github/workflows/deploy-api-green.yml"
  workflow_dispatch:
    inputs:
      git_sha:
        description: "40-character Git SHA to publish; defaults to the selected branch SHA"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-green-api-image
  cancel-in-progress: false

jobs:
  publish:
    name: test-and-publish-green-api-image
    if: github.event_name == 'workflow_dispatch' || vars.GREEN_CD_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Resolve immutable deployment target
        id: target
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.git_sha }}
          DEFAULT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          target_sha="${REQUESTED_SHA:-$DEFAULT_SHA}"
          [[ "$target_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::git_sha must be a 40-character lowercase Git SHA"
            exit 1
          }
          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout target commit
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Verify target belongs to main
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
        run: |
          git fetch --quiet origin main
          git merge-base --is-ancestor "$DEPLOY_SHA" origin/main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/requirements.txt

      - name: Validate Green deployment contracts
        run: |
          python -m pip install -r tools/requirements.txt
          python -m unittest tools.test_validate_infrastructure_separation tools.test_validate_green_deployment tools.test_bootstrap_green_asg tools.test_prepare_green_asg_builder tools.test_provision_green_private_app_network tools.test_migrate_green_web_asg_private tools.test_rollout_green_web_asg_release
          python tools/validate_infrastructure_separation.py

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run API tests
        working-directory: apps/api
        run: ./gradlew test --no-daemon

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reuse or publish immutable API image
        id: image
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.GREEN_API_ECR_REPOSITORY }}
        run: |
          set -euo pipefail
          : "${ECR_REPOSITORY:?GREEN_API_ECR_REPOSITORY repository variable is required}"
          image_uri="${ECR_REGISTRY}/${ECR_REPOSITORY}:${DEPLOY_SHA}"
          if aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids "imageTag=$DEPLOY_SHA" >/dev/null 2>&1; then
            echo "Reusing existing immutable API image for $DEPLOY_SHA"
          else
            docker build --pull -t "$image_uri" apps/api
            docker push "$image_uri"
          fi
          echo "uri=$image_uri" >> "$GITHUB_OUTPUT"

      - name: Record publication
        if: success()
        run: |
          {
            echo "### Green API image publication succeeded"
            echo
            echo "- Commit: \`${{ steps.target.outputs.sha }}\`"
            echo "- Image: \`${{ steps.image.outputs.uri }}\`"
            echo "- Runtime deployment: not performed"
            echo "- Next step: run \`Release Green Web ASG\`; realtime functions may be briefly unstable during overlap"
          } >> "$GITHUB_STEP_SUMMARY"
