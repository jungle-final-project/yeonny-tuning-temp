name: Fast Deploy Green Web ASG

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Existing ASG container to update in place"
        required: true
        type: choice
        options:
          - api
          - xgb-reranker
      git_sha:
        description: "Exact current main SHA; defaults to the selected branch SHA"
        required: false
        type: string
      image_tag:
        description: "Immutable ECR SHA tag; defaults to git_sha"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-green-web-asg-release
  cancel-in-progress: false

jobs:
  deploy:
    name: fast-deploy-green-web-asg
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Resolve immutable deployment target
        id: target
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.git_sha }}
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
          DEFAULT_SHA: ${{ github.sha }}
          SERVICE: ${{ inputs.service }}
        run: |
          set -euo pipefail
          target_sha="${REQUESTED_SHA:-$DEFAULT_SHA}"
          image_tag="${REQUESTED_IMAGE_TAG:-$target_sha}"
          [[ "$target_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::git_sha must be a 40-character lowercase Git SHA"
            exit 1
          }
          [[ "$image_tag" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::image_tag must be a 40-character lowercase Git SHA"
            exit 1
          }
          [[ "$target_sha" == "$image_tag" ]] || {
            echo "::error::git_sha and image_tag must match for Fast Deploy"
            exit 1
          }
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout target commit
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Verify exact current main deployment
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          main_sha="$(git rev-parse origin/main)"
          [[ "$DEPLOY_SHA" == "$main_sha" ]] || {
            echo "::error::Fast Deploy must use the exact current origin/main SHA: $main_sha"
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/requirements.txt

      - name: Validate Fast Deploy contracts
        run: |
          python -m pip install -r tools/requirements.txt
          python -m unittest \
            tools.test_validate_green_deployment \
            tools.test_fast_deploy_green_web_asg

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read-only Fast Deploy preflight
        shell: bash
        run: |
          bash tools/deploy_green_web_asg_in_place.sh \
            --service "${{ steps.target.outputs.service }}" \
            --git-sha "${{ steps.target.outputs.sha }}" \
            --image-tag "${{ steps.target.outputs.image_tag }}"

      - name: Update the existing ASG container
        id: deploy
        shell: bash
        run: |
          bash tools/deploy_green_web_asg_in_place.sh \
            --service "${{ steps.target.outputs.service }}" \
            --git-sha "${{ steps.target.outputs.sha }}" \
            --image-tag "${{ steps.target.outputs.image_tag }}" \
            --apply

      - name: Record Fast Deploy
        if: success()
        run: |
          {
            echo "### Green Web ASG Fast Deploy succeeded"
            echo
            echo "- Service: \`${{ steps.target.outputs.service }}\`"
            echo "- Commit: \`${{ steps.target.outputs.sha }}\`"
            echo "- ECR tag: \`${{ steps.target.outputs.image_tag }}\`"
            echo "- Existing instance: \`${{ steps.deploy.outputs.instance_id || 'see deploy log' }}\`"
            echo "- Next Launch Template version: \`${{ steps.deploy.outputs.launch_template_version || 'see deploy log' }}\`"
            echo "- Deployment mode: in-place container update; brief API or WebSocket interruption is accepted"
            echo "- Next step: verify API smoke and WebSocket reconnection"
          } >> "$GITHUB_STEP_SUMMARY"
