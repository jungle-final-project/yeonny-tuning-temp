services:
  postgres:
    build:
      context: ./infra/docker/postgres
    image: buildgraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buildgraph}
      POSTGRES_USER: ${POSTGRES_USER:-buildgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buildgraph} -d ${POSTGRES_DB:-buildgraph}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-buildgraph}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped

  xgb-reranker:
    build:
      context: .
      dockerfile: ./infra/docker/xgb-reranker/Dockerfile
    restart: unless-stopped
    environment:
      RECOMMENDATION_RERANKER_MODEL_PATH: ${RECOMMENDATION_RERANKER_MODEL_PATH:-}
      RECOMMENDATION_TRAINING_WORKER_ENABLED: ${RECOMMENDATION_TRAINING_WORKER_ENABLED:-false}
      RECOMMENDATION_TRAINING_MIN_ROWS: ${RECOMMENDATION_TRAINING_MIN_ROWS:-50}
      RECOMMENDATION_TRAINING_POLL_SECONDS: ${RECOMMENDATION_TRAINING_POLL_SECONDS:-5}
      RECOMMENDATION_DB_HOST: postgres
      RECOMMENDATION_DB_PORT: 5432
      RECOMMENDATION_DB_NAME: ${POSTGRES_DB:-buildgraph}
      RECOMMENDATION_DB_USER: ${POSTGRES_USER:-buildgraph}
      RECOMMENDATION_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - recommendation-models:/models
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8091/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-buildgraph}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-buildgraph}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-buildgraph}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
      SPRING_MAIL_HOST: mailpit
      PAYMENT_MOCK_ENABLED: ${PAYMENT_MOCK_ENABLED:-false}
      PAYMENT_MOCK_WEBHOOK_SECRET: ${PAYMENT_MOCK_WEBHOOK_SECRET:-}
      SPRING_MAIL_PORT: 1025
      BUILDGRAPH_AUTH_JWT_SECRET: ${BUILDGRAPH_AUTH_JWT_SECRET:?BUILDGRAPH_AUTH_JWT_SECRET is required}
      BUILDGRAPH_CORS_ALLOWED_ORIGINS: ${BUILDGRAPH_CORS_ALLOWED_ORIGINS:?BUILDGRAPH_CORS_ALLOWED_ORIGINS is required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_WEB_CALLBACK_URL: ${GOOGLE_OAUTH_WEB_CALLBACK_URL:-}
      SUPPORT_CHAT_WS_TICKET_TTL_SECONDS: ${SUPPORT_CHAT_WS_TICKET_TTL_SECONDS:-60}
      AGENT_RUNNER_MODE: ${AGENT_RUNNER_MODE:-deterministic}
      AGENT_LOG_STORAGE_ROOT: ${AGENT_LOG_STORAGE_ROOT:-/data/agent-logs}
      AGENT_DEMO_ACTIVATION_TOKEN: ${AGENT_DEMO_ACTIVATION_TOKEN:-}
      PART_MANUFACTURER_RELEASE_DEMO_FEED_ENABLED: ${PART_MANUFACTURER_RELEASE_DEMO_FEED_ENABLED:-false}
      DEMO_FREEZE_MUTATIONS: ${DEMO_FREEZE_MUTATIONS:-false}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-medium}
      PC_AGENT_DIAGNOSIS_CHAT_MODEL: ${PC_AGENT_DIAGNOSIS_CHAT_MODEL:-gpt-5.4-mini}
      PC_AGENT_DIAGNOSIS_CHAT_REASONING_EFFORT: ${PC_AGENT_DIAGNOSIS_CHAT_REASONING_EFFORT:-low}
      PC_AGENT_DIAGNOSIS_CHAT_MAX_OUTPUT_TOKENS: ${PC_AGENT_DIAGNOSIS_CHAT_MAX_OUTPUT_TOKENS:-750}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
      RAG_VECTOR_ENABLED: ${RAG_VECTOR_ENABLED:-true}
      RAG_VECTOR_REQUIREMENT_PARSE_ENABLED: ${RAG_VECTOR_REQUIREMENT_PARSE_ENABLED:-${RAG_VECTOR_ENABLED:-true}}
      RAG_VECTOR_BUILD_RECOMMEND_ENABLED: ${RAG_VECTOR_BUILD_RECOMMEND_ENABLED:-${RAG_VECTOR_ENABLED:-true}}
      RAG_VECTOR_AS_ANALYZE_ENABLED: ${RAG_VECTOR_AS_ANALYZE_ENABLED:-${RAG_VECTOR_ENABLED:-true}}
      RAG_VECTOR_PUBLIC_SEARCH_ENABLED: ${RAG_VECTOR_PUBLIC_SEARCH_ENABLED:-${RAG_VECTOR_ENABLED:-true}}
      RAG_EMBEDDING_BACKFILL_ON_STARTUP: ${RAG_EMBEDDING_BACKFILL_ON_STARTUP:-false}
      AS_CHAT_DEFAULT_PROFILE: ${AS_CHAT_DEFAULT_PROFILE:-AS_CHAT_54_MINI_FAST}
      AS_CHAT_FAST_MODEL: ${AS_CHAT_FAST_MODEL:-gpt-5.5}
      AS_CHAT_FAST_REASONING_EFFORT: ${AS_CHAT_FAST_REASONING_EFFORT:-low}
      AS_CHAT_FAST_RAG_TOP_K: ${AS_CHAT_FAST_RAG_TOP_K:-2}
      AS_CHAT_FAST_MAX_OUTPUT_TOKENS: ${AS_CHAT_FAST_MAX_OUTPUT_TOKENS:-900}
      AS_CHAT_FAST_RECENT_MESSAGE_LIMIT: ${AS_CHAT_FAST_RECENT_MESSAGE_LIMIT:-3}
      AS_CHAT_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT: ${AS_CHAT_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:-false}
      AS_CHAT_FAST_INCLUDE_TOOL_RESULT_PAYLOAD: ${AS_CHAT_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:-false}
      AS_CHAT_FAST_USE_COMPACT_PROMPT: ${AS_CHAT_FAST_USE_COMPACT_PROMPT:-true}
      AS_CHAT_54_FAST_MODEL: ${AS_CHAT_54_FAST_MODEL:-gpt-5.4}
      AS_CHAT_54_FAST_REASONING_EFFORT: ${AS_CHAT_54_FAST_REASONING_EFFORT:-low}
      AS_CHAT_54_FAST_RAG_TOP_K: ${AS_CHAT_54_FAST_RAG_TOP_K:-2}
      AS_CHAT_54_FAST_MAX_OUTPUT_TOKENS: ${AS_CHAT_54_FAST_MAX_OUTPUT_TOKENS:-900}
      AS_CHAT_54_FAST_RECENT_MESSAGE_LIMIT: ${AS_CHAT_54_FAST_RECENT_MESSAGE_LIMIT:-3}
      AS_CHAT_54_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT: ${AS_CHAT_54_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:-false}
      AS_CHAT_54_FAST_INCLUDE_TOOL_RESULT_PAYLOAD: ${AS_CHAT_54_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:-false}
      AS_CHAT_54_FAST_USE_COMPACT_PROMPT: ${AS_CHAT_54_FAST_USE_COMPACT_PROMPT:-true}
      AS_CHAT_54_MINI_FAST_MODEL: ${AS_CHAT_54_MINI_FAST_MODEL:-gpt-5.4-mini}
      AS_CHAT_54_MINI_FAST_REASONING_EFFORT: ${AS_CHAT_54_MINI_FAST_REASONING_EFFORT:-low}
      AS_CHAT_54_MINI_FAST_RAG_TOP_K: ${AS_CHAT_54_MINI_FAST_RAG_TOP_K:-2}
      AS_CHAT_54_MINI_FAST_MAX_OUTPUT_TOKENS: ${AS_CHAT_54_MINI_FAST_MAX_OUTPUT_TOKENS:-850}
      AS_CHAT_54_MINI_FAST_RECENT_MESSAGE_LIMIT: ${AS_CHAT_54_MINI_FAST_RECENT_MESSAGE_LIMIT:-3}
      AS_CHAT_54_MINI_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT: ${AS_CHAT_54_MINI_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:-false}
      AS_CHAT_54_MINI_FAST_INCLUDE_TOOL_RESULT_PAYLOAD: ${AS_CHAT_54_MINI_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:-false}
      AS_CHAT_54_MINI_FAST_USE_COMPACT_PROMPT: ${AS_CHAT_54_MINI_FAST_USE_COMPACT_PROMPT:-true}
      AS_CHAT_NANO_FAST_MODEL: ${AS_CHAT_NANO_FAST_MODEL:-gpt-5.4-nano}
      AS_CHAT_NANO_FAST_REASONING_EFFORT: ${AS_CHAT_NANO_FAST_REASONING_EFFORT:-low}
      AS_CHAT_NANO_FAST_RAG_TOP_K: ${AS_CHAT_NANO_FAST_RAG_TOP_K:-2}
      AS_CHAT_NANO_FAST_MAX_OUTPUT_TOKENS: ${AS_CHAT_NANO_FAST_MAX_OUTPUT_TOKENS:-700}
      AS_CHAT_NANO_FAST_RECENT_MESSAGE_LIMIT: ${AS_CHAT_NANO_FAST_RECENT_MESSAGE_LIMIT:-2}
      AS_CHAT_NANO_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT: ${AS_CHAT_NANO_FAST_INCLUDE_EVIDENCE_CHUNK_TEXT:-false}
      AS_CHAT_NANO_FAST_INCLUDE_TOOL_RESULT_PAYLOAD: ${AS_CHAT_NANO_FAST_INCLUDE_TOOL_RESULT_PAYLOAD:-false}
      AS_CHAT_NANO_FAST_USE_COMPACT_PROMPT: ${AS_CHAT_NANO_FAST_USE_COMPACT_PROMPT:-true}
      AS_CHAT_BALANCED_MODEL: ${AS_CHAT_BALANCED_MODEL:-gpt-5.5}
      AS_CHAT_BALANCED_REASONING_EFFORT: ${AS_CHAT_BALANCED_REASONING_EFFORT:-low}
      AS_CHAT_BALANCED_RAG_TOP_K: ${AS_CHAT_BALANCED_RAG_TOP_K:-3}
      AS_CHAT_BALANCED_MAX_OUTPUT_TOKENS: ${AS_CHAT_BALANCED_MAX_OUTPUT_TOKENS:-1100}
      AS_CHAT_BALANCED_RECENT_MESSAGE_LIMIT: ${AS_CHAT_BALANCED_RECENT_MESSAGE_LIMIT:-4}
      AS_CHAT_BALANCED_INCLUDE_EVIDENCE_CHUNK_TEXT: ${AS_CHAT_BALANCED_INCLUDE_EVIDENCE_CHUNK_TEXT:-false}
      AS_CHAT_BALANCED_INCLUDE_TOOL_RESULT_PAYLOAD: ${AS_CHAT_BALANCED_INCLUDE_TOOL_RESULT_PAYLOAD:-false}
      AS_CHAT_BALANCED_USE_COMPACT_PROMPT: ${AS_CHAT_BALANCED_USE_COMPACT_PROMPT:-true}
      AS_CHAT_HIGH_QUALITY_MODEL: ${AS_CHAT_HIGH_QUALITY_MODEL:-gpt-5.5}
      AS_CHAT_HIGH_QUALITY_REASONING_EFFORT: ${AS_CHAT_HIGH_QUALITY_REASONING_EFFORT:-medium}
      AS_CHAT_HIGH_QUALITY_RAG_TOP_K: ${AS_CHAT_HIGH_QUALITY_RAG_TOP_K:-5}
      AS_CHAT_HIGH_QUALITY_MAX_OUTPUT_TOKENS: ${AS_CHAT_HIGH_QUALITY_MAX_OUTPUT_TOKENS:-2600}
      AS_CHAT_HIGH_QUALITY_RECENT_MESSAGE_LIMIT: ${AS_CHAT_HIGH_QUALITY_RECENT_MESSAGE_LIMIT:-5}
      AS_CHAT_HIGH_QUALITY_INCLUDE_EVIDENCE_CHUNK_TEXT: ${AS_CHAT_HIGH_QUALITY_INCLUDE_EVIDENCE_CHUNK_TEXT:-true}
      AS_CHAT_HIGH_QUALITY_INCLUDE_TOOL_RESULT_PAYLOAD: ${AS_CHAT_HIGH_QUALITY_INCLUDE_TOOL_RESULT_PAYLOAD:-false}
      AS_CHAT_HIGH_QUALITY_USE_COMPACT_PROMPT: ${AS_CHAT_HIGH_QUALITY_USE_COMPACT_PROMPT:-true}
      BUILD_CHAT_DEFAULT_PROFILE: ${BUILD_CHAT_DEFAULT_PROFILE:-BUILD_CHAT_54_MINI_FAST}
      BUILD_CHAT_CACHE_ENABLED: ${BUILD_CHAT_CACHE_ENABLED:-true}
      BUILD_CHAT_CACHE_TTL_SECONDS: ${BUILD_CHAT_CACHE_TTL_SECONDS:-600}
      BUILD_CHAT_CACHE_PREWARM_ENABLED: ${BUILD_CHAT_CACHE_PREWARM_ENABLED:-true}
      BUILD_CHAT_CACHE_PREWARM_TTL_SECONDS: ${BUILD_CHAT_CACHE_PREWARM_TTL_SECONDS:-3600}
      BUILD_CHAT_CACHE_PREWARM_REFRESH_DELAY_MS: ${BUILD_CHAT_CACHE_PREWARM_REFRESH_DELAY_MS:-2700000}
      BUILD_CHAT_SEMANTIC_CACHE_ENABLED: ${BUILD_CHAT_SEMANTIC_CACHE_ENABLED:-true}
      BUILD_CHAT_SEMANTIC_CACHE_THRESHOLD: ${BUILD_CHAT_SEMANTIC_CACHE_THRESHOLD:-0.94}
      BUILD_CHAT_SEMANTIC_CACHE_TTL_SECONDS: ${BUILD_CHAT_SEMANTIC_CACHE_TTL_SECONDS:-600}
      BUILD_CHAT_TIER_SNAPSHOT_ENABLED: ${BUILD_CHAT_TIER_SNAPSHOT_ENABLED:-true}
      BUILD_CHAT_TIER_SNAPSHOT_MIN_BUDGET_WON: ${BUILD_CHAT_TIER_SNAPSHOT_MIN_BUDGET_WON:-2000000}
      BUILD_CHAT_TIER_SNAPSHOT_MAX_BUDGET_WON: ${BUILD_CHAT_TIER_SNAPSHOT_MAX_BUDGET_WON:-13000000}
      BUILD_CHAT_TIER_SNAPSHOT_STEP_WON: ${BUILD_CHAT_TIER_SNAPSHOT_STEP_WON:-1000000}
      BUILD_CHAT_TIER_SNAPSHOT_REFRESH_DELAY_MS: ${BUILD_CHAT_TIER_SNAPSHOT_REFRESH_DELAY_MS:-3600000}
      BUILD_CHAT_TIER_SNAPSHOT_TOLERANCE_PCT: ${BUILD_CHAT_TIER_SNAPSHOT_TOLERANCE_PCT:-15}
      BUILD_CHAT_FAST_MODEL: ${BUILD_CHAT_FAST_MODEL:-gpt-5.5}
      BUILD_CHAT_FAST_REASONING_EFFORT: ${BUILD_CHAT_FAST_REASONING_EFFORT:-low}
      BUILD_CHAT_FAST_RAG_TOP_K: ${BUILD_CHAT_FAST_RAG_TOP_K:-3}
      BUILD_CHAT_FAST_MAX_OUTPUT_TOKENS: ${BUILD_CHAT_FAST_MAX_OUTPUT_TOKENS:-900}
      BUILD_CHAT_FAST_RECENT_MESSAGE_LIMIT: ${BUILD_CHAT_FAST_RECENT_MESSAGE_LIMIT:-0}
      BUILD_CHAT_54_FAST_MODEL: ${BUILD_CHAT_54_FAST_MODEL:-gpt-5.4}
      BUILD_CHAT_54_FAST_REASONING_EFFORT: ${BUILD_CHAT_54_FAST_REASONING_EFFORT:-low}
      BUILD_CHAT_54_FAST_RAG_TOP_K: ${BUILD_CHAT_54_FAST_RAG_TOP_K:-3}
      BUILD_CHAT_54_FAST_MAX_OUTPUT_TOKENS: ${BUILD_CHAT_54_FAST_MAX_OUTPUT_TOKENS:-900}
      BUILD_CHAT_54_FAST_RECENT_MESSAGE_LIMIT: ${BUILD_CHAT_54_FAST_RECENT_MESSAGE_LIMIT:-0}
      BUILD_CHAT_54_MINI_FAST_MODEL: ${BUILD_CHAT_54_MINI_FAST_MODEL:-gpt-5.4-mini}
      BUILD_CHAT_54_MINI_FAST_REASONING_EFFORT: ${BUILD_CHAT_54_MINI_FAST_REASONING_EFFORT:-low}
      BUILD_CHAT_54_MINI_FAST_RAG_TOP_K: ${BUILD_CHAT_54_MINI_FAST_RAG_TOP_K:-3}
      BUILD_CHAT_54_MINI_FAST_MAX_OUTPUT_TOKENS: ${BUILD_CHAT_54_MINI_FAST_MAX_OUTPUT_TOKENS:-850}
      BUILD_CHAT_54_MINI_FAST_RECENT_MESSAGE_LIMIT: ${BUILD_CHAT_54_MINI_FAST_RECENT_MESSAGE_LIMIT:-0}
      RECOMMENDATION_RERANKER_ENABLED: ${RECOMMENDATION_RERANKER_ENABLED:-false}
      RECOMMENDATION_RERANKER_SHADOW_ENABLED: ${RECOMMENDATION_RERANKER_SHADOW_ENABLED:-true}
      RECOMMENDATION_RERANKER_ENDPOINT: ${RECOMMENDATION_RERANKER_ENDPOINT:-http://xgb-reranker:8091/score}
      RECOMMENDATION_RERANKER_TIMEOUT_MS: ${RECOMMENDATION_RERANKER_TIMEOUT_MS:-1200}
      NAVER_SEARCH_CLIENT_ID: ${NAVER_SEARCH_CLIENT_ID:-}
      NAVER_SEARCH_CLIENT_SECRET: ${NAVER_SEARCH_CLIENT_SECRET:-}
      NAVER_SEARCH_BASE_URL: ${NAVER_SEARCH_BASE_URL:-https://openapi.naver.com}
      PART_PRICE_REFRESH_ENABLED: ${PART_PRICE_REFRESH_ENABLED:-true}
      PART_PRICE_REFRESH_CRON: "${PART_PRICE_REFRESH_CRON:-0 0 4 * * *}"
      PART_PRICE_REFRESH_ZONE: ${PART_PRICE_REFRESH_ZONE:-Asia/Seoul}
      PART_DANAWA_REFRESH_ENABLED: ${PART_DANAWA_REFRESH_ENABLED:-false}
      PART_DANAWA_REFRESH_CRON: "${PART_DANAWA_REFRESH_CRON:-0 30 4 * * *}"
      PART_DANAWA_REFRESH_ZONE: ${PART_DANAWA_REFRESH_ZONE:-Asia/Seoul}
      PART_DANAWA_BASE_URL: ${PART_DANAWA_BASE_URL:-https://search.danawa.com}
      PART_DANAWA_RATE_LIMIT_MS: ${PART_DANAWA_RATE_LIMIT_MS:-3000}
      PART_DANAWA_TREND_REFRESH_ENABLED: ${PART_DANAWA_TREND_REFRESH_ENABLED:-false}
      PART_DANAWA_TREND_REFRESH_CRON: "${PART_DANAWA_TREND_REFRESH_CRON:-0 30 5 1 * *}"
      PART_DANAWA_TREND_REFRESH_ZONE: ${PART_DANAWA_TREND_REFRESH_ZONE:-Asia/Seoul}
      PART_DANAWA_TREND_BASE_URL: ${PART_DANAWA_TREND_BASE_URL:-https://prod.danawa.com}
      PART_DANAWA_TREND_SEARCH_BASE_URL: ${PART_DANAWA_TREND_SEARCH_BASE_URL:-https://search.danawa.com}
      PART_DANAWA_TREND_RATE_LIMIT_MS: ${PART_DANAWA_TREND_RATE_LIMIT_MS:-3000}
      PART_MANUFACTURER_RELEASE_INTAKE_ENABLED: ${PART_MANUFACTURER_RELEASE_INTAKE_ENABLED:-false}
      PART_MANUFACTURER_RELEASE_INTAKE_CRON: "${PART_MANUFACTURER_RELEASE_INTAKE_CRON:-0 0 6 * * *}"
      PART_MANUFACTURER_RELEASE_INTAKE_ZONE: ${PART_MANUFACTURER_RELEASE_INTAKE_ZONE:-Asia/Seoul}
      PART_MANUFACTURER_RELEASE_INTAKE_USER_AGENT: ${PART_MANUFACTURER_RELEASE_INTAKE_USER_AGENT:-BuildGraphBot/0.1}
      SCHEDULING_POOL_SIZE: ${SCHEDULING_POOL_SIZE:-4}
    volumes:
      - agent-log-data:/data/agent-logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      xgb-reranker:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  recommendation-models:
  agent-log-data:
