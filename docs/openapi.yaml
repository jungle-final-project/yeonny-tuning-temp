    post:
      summary: 관리자 대표가 수동 보정
      description: parts.price를 수정하고 price_snapshots.source=ADMIN_MANUAL 이력을 남긴다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminManualPriceRequest"
      responses:
        "200":
          description: 가격 보정 후 부품
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDto"
  /api/admin/parts/{id}/external-offer:
    patch:
      summary: 관리자 대표 offer 수동 보정
      description: part_external_offers.source=ADMIN_MANUAL row를 upsert한다. parts.price는 직접 변경하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminExternalOfferRequest"
      responses:
        "200":
          description: offer 보정 후 부품
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDto"
  /api/admin/parts/external-offers/refresh:
    post:
      summary: 외부 상품 캐시 갱신
      description: 네이버 쇼핑 검색 API를 호출해 part_external_offers 캐시를 갱신한다. 사용자 부품 조회 API는 이 캐시만 읽는다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: force
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 갱신 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalOfferRefreshResponse"
