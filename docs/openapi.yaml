openapi: 3.0.3
info:
  title: BuildGraph AI 프로토타입 API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      summary: API 상태 확인
      responses:
        "200":
          description: 정상 응답
  /api/auth/login:
    post:
      summary: 이메일 로그인
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT 토큰과 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/users:
    post:
      summary: 회원가입
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 생성된 사용자
  /api/auth/me:
    get:
      summary: 현재 사용자 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
  /api/requirements/parse:
    post:
      summary: 자연어 요구사항 파싱
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementParseRequest"
      responses:
        "200":
          description: 파싱된 요구사항
  /api/builds/recommend:
    post:
      summary: 시드 기반 빌드 추천
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRecommendRequest"
      responses:
        "200":
          description: 빌드 추천 결과
  /api/builds/{id}:
    get:
      summary: 빌드 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 빌드 상세 정보
  /api/builds/history:
    get:
      summary: 저장된 빌드 이력
      responses:
        "200":
          description: 이력
  /api/builds/{id}/change-part:
    post:
      summary: 부품 변경 비교 및 적용
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePartRequest"
      responses:
        "200":
          description: 변경 차이
  /api/parts:
    get:
      summary: 부품 목록
      responses:
        "200":
          description: 부품
  /api/parts/{id}:
    get:
      summary: 부품 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 부품
  /api/tools/{tool}/check:
    post:
      summary: 검증 도구 실행
      parameters:
        - in: path
          name: tool
          required: true
          schema:
            type: string
            enum: [compatibility, power, size, performance, price]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCheckRequest"
      responses:
        "200":
          description: 도구 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolResult"
  /api/agent/sessions:
    post:
      summary: 제한된 에이전트 세션 생성
      responses:
        "200":
          description: 생성된 에이전트 세션 임시 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"
  /api/agent/sessions/{id}/run:
    post:
      summary: 제한된 에이전트 오케스트레이션 실행
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 상태 타임라인과 도구 호출을 포함한 에이전트 실행 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"
  /api/agent/sessions/{id}:
    get:
      summary: 에이전트 세션 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 에이전트 세션 상세 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSession"
  /api/rag/search:
    get:
      summary: RAG 근거 후보 검색
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: RAG 근거 후보
  /api/rag/evidence/{id}:
    get:
      summary: RAG 근거 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RAG 근거 상세 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEvidence"
  /api/price-alerts:
    get:
      summary: 가격 알림 목록
      responses:
        "200":
          description: 알림
    post:
      summary: 목표가 알림 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceAlertCreateRequest"
      responses:
        "201":
          description: 생성된 알림
  /api/price-snapshots/collect:
    post:
      summary: 가격 스냅샷 수집 대기열 등록
      responses:
        "202":
          description: 가격 수집 작업 대기열 등록 완료
  /api/agent-logs/upload:
    post:
      summary: 최근 에이전트 로그 업로드
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentLogUploadRequest"
      responses:
        "201":
          description: 업로드된 로그 메타데이터
  /api/agent-logs/{id}:
    get:
      summary: 에이전트 로그 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 로그 요약
  /api/as-tickets:
    post:
      summary: AS 티켓 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsTicketCreateRequest"
      responses:
        "201":
          description: 생성된 티켓
  /api/as-tickets/{id}:
    get:
      summary: AS 티켓 상세 조회
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 티켓
  /api/admin/dashboard:
    get:
      summary: 관리자 대시보드
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 대시보드
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/agent-sessions/{id}:
    get:
      summary: 에이전트 세션 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 에이전트 세션
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/tool-invocations:
    get:
      summary: 도구 호출 목록
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 도구 호출
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/tool-invocations/{id}:
    get:
      summary: 도구 호출 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 도구 호출 상세 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvocation"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/rag-evidence/{id}:
    get:
      summary: 관리자 RAG 근거 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 관리자 검토용 RAG 근거 상세 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEvidence"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/as-tickets:
    get:
      summary: 관리자 AS 티켓 목록
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 티켓
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/as-tickets/{id}:
    get:
      summary: 관리자 AS 티켓 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 로그 정책과 원인 후보를 포함한 관리자 티켓 상세 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAsTicket"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/price-jobs:
    get:
      summary: 가격 작업 목록
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 작업
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/admin/price-jobs/run:
    post:
      summary: 가격 수집 작업 실행
      security:
        - bearerAuth: []
      responses:
        "202":
          description: 작업 대기열 등록 완료
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    UnauthorizedError:
      description: 로그인 필요
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ForbiddenError:
      description: 관리자 권한 필요
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [UNAUTHORIZED, FORBIDDEN, API_ERROR]
        message:
          type: string
    RequirementParseRequest:
      type: object
      properties:
        message:
          type: string
        budget:
          type: integer
    BuildRecommendRequest:
      type: object
      required: [requirementId]
      properties:
        requirementId:
          type: string
    ChangePartRequest:
      type: object
      required: [itemId, replacementPartId]
      properties:
        itemId:
          type: string
        replacementPartId:
          type: string
    ToolCheckRequest:
      type: object
      description: MVP 스캐폴드에서는 compatibility, power, size, performance, price 도구를 `/api/tools/{tool}/check` 하나의 경로로 축약한다.
      additionalProperties: true
    PriceAlertCreateRequest:
      type: object
      required: [partId, targetPrice, email]
      properties:
        partId:
          type: string
        targetPrice:
          type: integer
        email:
          type: string
          format: email
    AgentLogUploadRequest:
      type: object
      required: [logRangeMinutes, consent]
      properties:
        logRangeMinutes:
          type: integer
          example: 30
        consent:
          type: boolean
    AsTicketCreateRequest:
      type: object
      required: [symptom, logUploadId]
      properties:
        symptom:
          type: string
        logUploadId:
          type: string
    ToolResult:
      type: object
      properties:
        status:
          type: string
          enum: [PASS, WARN, FAIL]
        score:
          type: number
        confidence:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        summary:
          type: string
        warnings:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/RagEvidence"
    AgentSession:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [QUEUED, RUNNING, RAG_SEARCHED, TOOLS_CALLED, SUMMARY_READY, FAILED, FALLBACK_READY]
        mode:
          type: string
          example: LIMITED_ORCHESTRATOR
        stateTimeline:
          type: array
          items:
            $ref: "#/components/schemas/AgentState"
        toolInvocations:
          type: array
          items:
            $ref: "#/components/schemas/ToolResult"
        fallbackPolicy:
          type: string
        summary:
          type: string
    AgentState:
      type: object
      properties:
        state:
          type: string
        owner:
          type: string
        description:
          type: string
    ToolInvocation:
      type: object
      properties:
        id:
          type: string
        sessionId:
          type: string
        tool:
          type: string
        status:
          type: string
          enum: [PASS, WARN, FAIL]
        confidence:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        latencyMs:
          type: integer
        request:
          type: object
        result:
          $ref: "#/components/schemas/ToolResult"
    RagEvidence:
      type: object
      properties:
        id:
          type: string
        sourceId:
          type: string
        summary:
          type: string
        score:
          type: number
        usedBy:
          type: string
    AdminAsTicket:
      type: object
      properties:
        id:
          type: string
        user:
          type: string
        symptom:
          type: string
        status:
          type: string
        logRangeMinutes:
          type: integer
          example: 30
        consentRequired:
          type: boolean
        retentionDays:
          type: integer
          example: 30
        causeCandidates:
          type: array
          items:
            type: string
        upgradeCandidates:
          type: array
          items:
            type: string
