openapi: 3.0.3
info:
  title: BuildGraph AI MVP API
  version: 0.2.0
  description: BuildGraph 3주 MVP 공통 API 계약. 상세 기준은 docs/API_CONTRACT.md를 따른다.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: API 상태 확인
      security: []
      responses:
        "200":
          description: 정상 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: DB 연결 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/users:
    post:
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 생성된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/login:
    post:
      summary: 이메일 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      summary: access token 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 재발급된 token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /api/auth/logout:
    post:
      security:
        - bearerAuth: []
      summary: 로그아웃
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: 로그아웃 완료
  /api/auth/me:
    get:
      summary: 현재 사용자 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/google/start:
    get:
      summary: Google OAuth 시작
      security: []
      responses:
        "302":
          description: Google OAuth로 redirect
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback
      security: []
      responses:
        "302":
          description: 프론트 callback route로 redirect
  /api/auth/exchange:
    post:
      summary: OAuth one-time code 교환
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthExchangeRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/requirements/parse:
    post:
      summary: 자연어 요구사항 파싱
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementParseRequest"
      responses:
        "200":
          description: 파싱된 요구사항
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementDto"
  /api/builds/recommend:
    post:
      summary: 추천 Build 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRecommendRequest"
      responses:
        "200":
          description: 추천 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRecommendResponse"
  /api/builds/{id}:
    get:
      summary: Build 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
  /api/builds/history:
    get:
      summary: 내 Build 이력
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Build 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildPage"
  /api/builds/{id}/change-part:
    post:
      summary: Build 부품 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePartRequest"
      responses:
        "200":
          description: 부품 변경 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePartResponse"
  /api/ai/build-chat:
    post:
      summary: AI 챗봇 LLM/RAG 기반 Build 추천
      description: LLM/RAG로 message의 intent와 구조화 조건을 분석하고, 실제 ACTIVE parts DB와 Tool 검증 결과로 AI 추천 조합을 반환한다. LLM은 부품 ID/가격을 만들지 않으며, OPENAI_API_KEY가 없으면 428을 반환한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiBuildChatRequest"
      responses:
        "200":
          description: 챗봇 추천 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiBuildChatResponse"
        "428":
          description: OPENAI_API_KEY 등 LLM 필수 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM 호출 실패 또는 JSON 계약 위반
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/parts:
    get:
      summary: 부품 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: q
          schema:
            type: string
          description: 부품명, 제조사, attributes JSON 검색어
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/GenericStatus"
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sort
          schema:
            type: string
            enum: [category, price_asc, price_desc, name]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPage"
  /api/parts/{id}:
    get:
      summary: 부품 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 부품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartDto"
  /api/parts/{id}/price-history:
    get:
      summary: 부품 가격 이력
      description: 저장된 price_snapshots를 기준으로 상품별 가격변동 추이를 조회한다. 외부 검색 API를 실시간 호출하지 않는다. source를 생략하면 네이버 현재가 이력, 다나와 백업, 다나와 월별 추이, 수동 seed를 함께 반환할 수 있다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 3650
            default: 90
        - in: query
          name: source
          schema:
            type: string
          description: "특정 가격 출처만 조회할 때 사용한다. 생략하면 NAVER_SHOPPING_SEARCH, DANAWA_BACKUP, DANAWA_PRICE_TREND, MANUAL_CURRENT_LINEUP 등 저장된 전체 이력을 조회한다."
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        "200":
          description: 부품 가격 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPriceHistoryResponse"
  /api/quote-drafts/current:
    get:
      summary: 현재 로그인 사용자의 수동 견적초안
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 견적초안. active draft가 없으면 status=EMPTY로 반환한다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/quote-drafts/current/apply-ai-build:
    put:
      summary: AI 추천 조합을 현재 견적초안에 batch 적용
      description: conflictPolicy=REPLACE만 지원한다. 현재 active 견적초안의 모든 항목을 soft delete한 뒤 요청 items를 하나의 AI 추천 조합으로 다시 담는다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiBuildApplyRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/quote-drafts/current/items/{partId}:
    put:
      summary: 견적초안에 부품 담기 또는 같은 카테고리 교체
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDraftItemUpsertRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
    patch:
      summary: 견적초안 부품 수량 변경
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDraftItemUpsertRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
    delete:
      summary: 견적초안에서 부품 제거
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/price-alerts:
    get:
      summary: 목표가 알림 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 목표가 알림 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertPage"
    post:
      summary: 목표가 알림 등록
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceAlertCreateRequest"
      responses:
        "201":
          description: 생성된 알림
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertDto"
  /api/admin/price-jobs:
    get:
      summary: 관리자 가격 수집 작업 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 가격 수집 작업 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobPage"
  /api/admin/price-jobs/run:
    post:
      summary: 가격 수집 작업 실행
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceJobRunRequest"
      responses:
        "201":
          description: 생성된 가격 수집 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobDto"
  /api/admin/parts/external-offers/refresh:
    post:
      summary: 외부 상품 캐시 갱신
      description: 네이버 쇼핑 검색 API를 호출해 part_external_offers 캐시를 갱신한다. 사용자 부품 조회 API는 이 캐시만 읽는다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: force
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 갱신 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalOfferRefreshResponse"
  /api/admin/parts/danawa-price-snapshots/refresh:
    post:
      summary: 다나와 백업 가격 이력 수집
      description: 공개 검색 페이지에서 확인 가능한 가격 후보를 DANAWA_BACKUP source로 저장한다. parts.price는 갱신하지 않고 price_snapshots와 part_external_offers 백업 row만 갱신한다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: force
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 다나와 백업 가격 이력 수집 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DanawaPriceSnapshotRefreshResponse"
  /api/admin/parts/danawa-price-trends/refresh:
    post:
      summary: 다나와 월별 가격 추이 수집
      description: 다나와 상품 상세의 공개 6/12/24개월 최저가 추이 그래프 포인트와 현재가를 DANAWA_PRICE_TREND source로 저장한다. parts.price는 갱신하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 286
        - in: query
          name: months
          schema:
            type: integer
            enum: [6, 12, 24]
            default: 6
        - in: query
          name: force
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 다나와 월별 가격 추이 수집 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DanawaPriceTrendRefreshResponse"
  /api/admin/parts/catalog/refresh:
    post:
      summary: 내부 자산 카탈로그 후보 갱신
      description: 카테고리별 query pack으로 외부 검색 API를 호출해 part_catalog_candidates를 채우고, publish=true일 때 parts에 게시한다. 사용자 부품 조회 API는 외부 API를 직접 호출하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          required: true
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limitPerQuery
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 3
        - in: query
          name: publish
          schema:
            type: boolean
            default: false
        - in: query
          name: q
          schema:
            type: string
          description: 단일 검색어 테스트용. 생략하면 category별 query pack을 사용한다.
      responses:
        "200":
          description: 내부 자산 갱신 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartCatalogRefreshResponse"
  /api/admin/manufacturer-sources:
    get:
      summary: 제조사 신제품 감지 source 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: enabled
          schema:
            type: boolean
      responses:
        "200":
          description: 제조사 source 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourceListResponse"
    post:
      summary: 제조사 신제품 감지 source 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManufacturerSourceRequest"
      responses:
        "200":
          description: 생성 또는 갱신된 제조사 source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourceDto"
  /api/admin/manufacturer-sources/{id}:
    patch:
      summary: 제조사 신제품 감지 source 수정
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManufacturerSourceRequest"
      responses:
        "200":
          description: 수정된 제조사 source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourceDto"
  /api/admin/manufacturer-sources/{id}/scan:
    post:
      summary: 단일 제조사 source scan
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: createCandidates
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: source scan 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourceScanResponse"
  /api/admin/manufacturer-sources/scan:
    post:
      summary: 활성 제조사 source 전체 scan
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limitPerSource
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: createCandidates
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: 전체 source scan 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourcesScanResponse"
  /api/admin/manufacturer-posts:
    get:
      summary: 제조사 공식 게시글 감지 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ManufacturerPostClassificationStatus"
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 제조사 게시글 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerPostListResponse"
  /api/admin/part-catalog-candidates:
    get:
      summary: 내부 자산 후보 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [DISCOVERED, PUBLISHED, REJECTED]
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: source
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 후보 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartCatalogCandidateListResponse"
  /api/admin/part-catalog-candidates/{id}/approve:
    post:
