    BuildGraphEdgeType:
      type: string
      enum: [REQUIRES, AFFECTS, BLOCKS, SUGGESTS]
    AiBuildChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        currentBuilds:
          type: array
          items:
            $ref: "#/components/schemas/AiBuildRecommendationDto"
        currentQuoteDraft:
          description: 현재 견적초안(그래프 상태) 문맥. 프론트는 드래프트 문맥이 필요한 요청(견적 완성·시뮬레이션·변경 명령 어휘)에 최신 드래프트를 실어 보낸다. 서버는 견적 완성 제약, 시뮬레이션 기준, 변경 미리보기 생성, 다중부품 감액 판정, 속성 1:1 비교 기준으로만 사용하고 직접 저장하지 않는다.
          allOf:
            - $ref: "#/components/schemas/QuoteDraftDto"
        uiContext:
          $ref: "#/components/schemas/AiBuildChatUiContext"
        assessmentContext:
          nullable: true
          description: 현재 로그인 사용자의 active quote draft 종합 점수 또는 특정 Tool 문제 설명 요청. 서버는 클라이언트의 점수·경고를 신뢰하지 않고 현재 DB 견적을 다시 평가한다.
          allOf:
            - $ref: "#/components/schemas/AiBuildAssessmentContext"
        clarificationContext:
          nullable: true
          description: 직전 되묻기(clarification) 응답의 originalMessage 에코. 서버는 이 값과 message를 합성해 한 문장처럼 라우팅한다(무상태 왕복, 되묻기 최대 1회 — 합성 후에도 정보가 부족하면 기본 예산을 가정하지 않고 사용자 원문을 인용해 한 번 더 정확히 묻는다). 라우터 되묻기 외에 LLM이 스스로 되물은 턴과 시뮬레이션 교체 대상 미해상 턴의 clarification에도 같은 방식으로 에코한다.
          type: object
          properties:
            originalMessage:
              type: string
    AiBuildChatResponse:
      type: object
      required: [answerType, message, builds, warnings]
      properties:
        answerType:
          $ref: "#/components/schemas/AiBuildChatAnswerType"
        message:
          type: string
        builds:
          type: array
          description: 견적 추천 질문은 추천 build 1~3개를 반환하고 사용자 문구의 추천 개수도 실제 배열 길이와 일치한다. 명시 예산 target 모드에서는 모든 카드의 totalPrice가 예산의 87.5%~112.5% 밴드 안에 들어야 하며, 밴드 밖 조합은 카드 수가 줄더라도 반환하지 않는다(밴드 밖 3장보다 밴드 안 2장을 택한다). 예산이 최소 구성가에 미달하면 밴드 밖 카드를 만들지 않고 builds=[]와 실제 최소가·부족액·다음 예산 quick reply를 반환한다. 예산은 충분하지만 근접 조합을 만들 수 없는 경우에만 해당 예산 모드를 지키는 '가능한 최소 구성' 카드 1장으로 폴백할 수 있다. 견적 변경(BUILD_MODIFY) 요청은 변경 미리보기 카드 1장(tier=draft-edit, badges=[DRAFT_EDIT_PREVIEW])을 반환한다. 시뮬레이션/명확화/거절(LLM 실패) 응답에서는 빈 배열이다.
          items:
            $ref: "#/components/schemas/AiBuildRecommendationDto"
        simulation:
          nullable: true
          description: 부품을 실제로 바꾸지 않고 성능/FPS/스펙 변화를 보여주는 읽기 전용 시뮬레이션 결과. 교체 시뮬레이션 외에 속성 요청(수랭/공랭·PCIe 세대·통풍)에 대한 '현재 부품 vs 속성 충족 최저가 후보' 1:1 비교에도 재사용된다(이때 answerType=GENERAL, quickReplies 없음).
          allOf:
            - $ref: "#/components/schemas/AiPerformanceSimulationDto"
        buildAssessment:
          nullable: true
          description: 현재 로그인 사용자의 active quote draft를 Tool과 종합 점수 정책으로 다시 평가한 읽기 전용 설명 카드. builds는 빈 배열이고 quote draft를 변경하지 않는다.
          allOf:
            - $ref: "#/components/schemas/AiBuildAssessmentDto"
        supportGuidance:
          nullable: true
          description: 쇼핑몰 AI가 PC 이상 증상을 인지했을 때 반환하는 접수 전 안내 카드. 증상 범주별 일반적 가능성만 표시하고, 위험도·확정 원인·지원 방식·로그 근거는 포함하지 않는다. 실제 로그 기반 진단은 agent token 전용 /api/agent/diagnosis-chat이 담당한다.
          allOf:
            - $ref: "#/components/schemas/AiSupportGuidanceDto"
        warnings:
          type: array
          items:
            type: string
          description: 상태 코드 문자열. 주요 값 — LOW_INFORMATION(되묻기), UNSUPPORTED_INTENT(LLM 실패 시 거절), PART_CONSTRAINT_NOT_FOUND(요청 스펙 부품 미보유), PART_BUDGET_SHORTFALL(스펙은 있으나 예산 부족), BUDGET_BELOW_MINIMUM(최소 구성가 미달), BUDGET_BELOW_USAGE_MINIMUM(GPU 필수 용도의 최소 구성가 미달 — 용도 인지 시 BUDGET_BELOW_MINIMUM을 대체), SIMULATION_TARGET_NOT_FOUND(교체 대상 미해상), SCORE_EXPLANATION_LLM_FALLBACK(문장 다듬기 실패로 Tool 기반 기본 문장 사용). ASSUMED_DEFAULT_BUDGET은 폐지되었다.
        evidenceIds:
          type: array
          items:
            type: string
          description: Build chat RAG 검색에 사용된 reusable evidence public id 목록
        quickReplies:
          type: array
          items:
            type: string
          description: >
            다음 행동 선택지 칩. 되묻기(명확화)뿐 아니라 우아한 거절(기능 안내 3종: "200만원 게이밍 PC 추천해줘"/"지금 견적 나머지 채워줘"/"CPU를 9700X로 바꾸면?"),
            역제안("{부품명} 견적에 담아줘"), 다중부품 감액 안내("{카테고리} 더 저렴한 걸로 바꿔줘") 응답에도 온다.
            카드·칩·되묻기·시뮬레이션이 전부 빈 응답에는 서버가 항상 칩을 채운다(dead-end 방지).
            각 항목은 그 자체로 완전한 프롬프트라서 그대로 다음 message로 보내면 된다.
        quickReplyCommands:
          type: array
          description: >
            구체 RAM/SSD 추천 칩의 직접 견적 추가 메타데이터. 일반 자연어 변경 요청에는 내려주지 않으며,
            클라이언트는 이 명령만 기존 quote draft item API로 즉시 반영할 수 있다.
          items:
            $ref: "#/components/schemas/AiQuickReplyCommandDto"
        boardFocus:
          nullable: true
          description: 셀프 견적 구성도에서 부품의 물리적 위치를 강조하는 읽기 전용 명령. uiContext가 SELF_QUOTE이고 BOARD_PART_FOCUS capability가 있을 때, 서버가 HIGH 확신으로 판정한 순수 위치 질문에만 반환한다. URL, 선택 카테고리, 견적초안은 변경하지 않는다.
          allOf:
            - $ref: "#/components/schemas/AiBoardFocusDto"
        clarification:
          nullable: true
          type: object
          description: 모호 요청 되묻기 정보. 라우터 되묻기 외에 LLM이 스스로 되물은 턴과 시뮬레이션 교체 대상 미해상 턴에도 부착되며, 이때 missingSlots는 빈 배열이다(원문 에코만 수행). 이미 되묻기 후속 턴이면 재부착하지 않는다(최대 1회). 프론트는 다음 요청의 clarificationContext로 originalMessage를 에코한다.
          properties:
            missingSlots:
              type: array
              items:
                type: string
            originalMessage:
              type: string
        agentSessionId:
          type: string
          nullable: true
          description: 저장 가능한 Agent root가 있을 때만 채워진다. 홈 챗봇 단독 대화는 null일 수 있다.
    AiBuildChatUiContext:
      type: object
      required: [surface, capabilities]
      properties:
        surface:
          type: string
          enum: [HOME, SELF_QUOTE]
        capabilities:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [BOARD_PART_FOCUS]
    AiBuildAssessmentContext:
      type: object
      required: [source, focusType]
      properties:
        source:
          type: string
          enum: [QUOTE_DRAFT_CURRENT]
