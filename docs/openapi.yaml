            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourceScanResponse"
  /api/admin/manufacturer-sources/scan:
    post:
      summary: 폴링 주기가 도래한 활성 제조사 source 일괄 scan
      description: enabled=true인 source 중 PAUSED가 아니고 poll_interval_minutes 주기가 last_checked_at 이후 지난 source만 scan한다. 말미에 후보 연결이 없는 기존 PRODUCT_CANDIDATE 게시글의 후보 생성을 backfill로 재시도한다(candidateBackfill).
