openapi: 3.0.3
info:
  title: BuildGraph AI MVP API
  version: 0.2.0
  description: BuildGraph 3주 MVP 공통 API 계약. 상세 기준은 docs/API_CONTRACT.md를 따른다. 데모 동결(DEMO_FREEZE_MUTATIONS=true) 스위치가 켜진 서버에서는 가격/다나와/추이/제조사 스캔 스케줄러 4종이 일괄 중지되어 SKIPPED_FROZEN으로 이력에 남고, POST /api/admin/price-jobs/run은 409 CONFLICT_STATE를 반환한다. 읽기 API에는 영향이 없다.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: API 상태 확인
      security: []
      responses:
        "200":
          description: 정상 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: DB 연결 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/public/home:
    get:
      summary: 비로그인 홈 화면 데이터 조회
      description: 저장된 ACTIVE 부품과 deterministic fallback 추천만 반환한다. 사용자 개인화, 추천 이벤트 기록, 외부 API 실시간 호출은 수행하지 않는다.
      security: []
      responses:
        "200":
          description: 공개 홈 화면 데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicHomeResponse"
  /api/demo/manufacturer-release-feed.xml:
    get:
      summary: 로컬 제조사 신제품 감지 데모 RSS
      description: 운영 source가 아니라 관리자 신제품 감지 데모용 read-only RSS feed다. scan을 누르면 manufacturer_posts에 게시글이 기록되고, 네이버 API가 설정된 경우 part_catalog_candidates 후보 생성까지 이어진다.
      security: []
      responses:
        "200":
          description: 데모 RSS feed
          content:
            application/xml:
              schema:
                type: string
  /api/users:
    post:
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 생성된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/users/me:
    patch:
      summary: 현재 사용자 개인정보 수정
      description: 저장 시에도 현재 비밀번호를 다시 확인한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
      responses:
        "200":
          description: 수정된 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/users/me/password-verification:
    post:
      summary: 현재 사용자 개인정보 수정 전 비밀번호 확인
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilePasswordVerificationRequest"
      responses:
        "204":
          description: 비밀번호 확인 완료
  /api/auth/login:
    post:
      summary: 이메일 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      summary: access token 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 재발급된 token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /api/auth/logout:
    post:
      security:
        - bearerAuth: []
      summary: 로그아웃
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: 로그아웃 완료
  /api/auth/me:
    get:
      summary: 현재 사용자 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/google/start:
    get:
      summary: Google OAuth 시작
      description: "Google OAuth authorization endpoint로 redirect한다. redirect query는 내부 경로만 허용하며 기본값은 `/`이다."
      security: []
      parameters:
        - in: query
          name: redirect
          required: false
          schema:
            type: string
            example: /my/quotes
      responses:
        "302":
          description: Google OAuth로 redirect
          headers:
            Location:
              schema:
                type: string
                format: uri
        "428":
          description: Google OAuth 환경변수 미설정
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback
      description: Google code/state를 검증한 뒤 서버 one-time code를 Redis에 저장하고 web callback으로 redirect한다.
      security: []
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
        - in: query
          name: error
          required: false
          schema:
            type: string
      responses:
        "302":
          description: "`/auth/callback?code=...&redirect=...` 또는 `/auth/callback?error=...`로 redirect"
          headers:
            Location:
              schema:
                type: string
                format: uri
  /api/auth/exchange:
    post:
      summary: OAuth one-time code 교환
      description: "Google callback에서 받은 서버 one-time code를 JWT/refresh token으로 교환한다. 신규 Google 사용자는 약관 동의와 연락처/주소 입력 전에는 `VALIDATION_ERROR`와 `details.reason=TERMS_REQUIRED`를 반환한다. 기존 Google USER 계정의 연락처/주소가 비어 있으면 one-time code를 소비하지 않고 `details.reason=CONTACT_REQUIRED`를 반환한다."
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthExchangeRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 신규 Google 사용자 약관 동의 필요 또는 요청 값 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 만료되었거나 재사용된 one-time code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/requirements/parse:
    post:
      summary: 자연어 요구사항 파싱
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementParseRequest"
      responses:
        "200":
          description: 파싱된 요구사항
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementDto"
  /api/builds/recommend:
    post:
      summary: 추천 Build 생성
      description: 내부 자산 후보와 Tool 검증으로 Build를 생성하고 Agent worker 실행을 큐에 넣는다. 응답의 agentSessionId는 즉시 반환되지만 worker 완료 전 evidenceIds와 toolResults는 비어 있을 수 있다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRecommendRequest"
      responses:
        "200":
          description: 추천 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRecommendResponse"
  /api/builds/from-chat:
    post:
      summary: AI 챗봇 임시 추천 Build 저장
      description: sessionStorage에만 있던 AI 챗봇 추천 조합을 사용자가 저장할 때 requirements, builds, build_items에 저장한다. AI/RAG를 다시 호출하지 않고 partId/category를 서버 DB와 대조한 뒤 Tool 검증은 저장 시 다시 실행한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildSaveFromChatRequest"
      responses:
        "200":
          description: 저장된 Build id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildSaveFromChatResponse"
  /api/builds/{id}:
    get:
      summary: Build 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
    patch:
      summary: 저장 견적 이름 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 120
      responses:
        "200":
          description: 이름 변경 후 Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
    delete:
      summary: 저장 견적 삭제(소프트 삭제 — 목록에서 감춤)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 삭제 결과
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  deleted:
                    type: boolean
  /api/builds/{id}/duplicate:
    post:
      summary: 저장 견적 복제('(사본)' 이름으로 새 Build 생성)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 복제된 Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
  /api/builds/history:
    get:
      summary: 내 Build 이력
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Build 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildPage"
  /api/builds/{id}/change-part:
    post:
      summary: Build 부품 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePartRequest"
      responses:
        "200":
          description: 부품 변경 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePartResponse"
  /api/ai/build-chat:
    post:
      summary: AI 챗봇 LLM/RAG 기반 Build 추천
      description: AI 챗봇 Build Chat. 지원 범위는 예산/현재 견적 기반 추천 조합 생성, 부품 교체 성능 시뮬레이션(수랭/공랭·PCIe 세대·통풍 속성 요청의 1:1 스펙비교 포함), 견적 변경 미리보기, 단일 부품 제약 역제안, 다중부품 감액 안내, 명확화 질문이다. 예산·용도가 모두 없는 모호 요청과 예산 없이 용도만 있는 요청은 견적 없이 되묻기(quickReplies 칩 + clarification)로 응답하고, 프론트가 clarificationContext를 에코한 후속 답변과 합성해 추천한다. 합성 후에도 정보가 부족하면 기본 예산을 가정하지 않고 사용자 원문을 인용해 한 번 더 정확히 묻는다(quickReplies 4칩 + clarification={missingSlots:[budget,useCase], originalMessage}). 무예산 용도-only 되묻기에는 예산대 방향 칩 4종("100/200/300만원대로 추천해줘", "예산 무관 고성능으로 추천해줘")이 붙는다. 화면 이동 등 범위 밖 요청도 즉답 거절하지 않고 LLM으로 강등해 맥락 답변을 시도하며, LLM 호출이 실패한 경우에만 warnings=[UNSUPPORTED_INTENT]와 기능 안내 quickReplies 3종을 담은 거절(GENERAL)로 응답한다. 견적초안 변경 요청은 builds에 변경 미리보기 카드 1장(tier=draft-edit, badges=[DRAFT_EDIT_PREVIEW], answerType=PART)과 총액 before→after 델타·교체/제거/추가 요약 메시지로 응답하고, 카드의 적용 버튼을 눌러야 실제 견적에 반영된다. 단일 부품 추천/제약 요청은 부품 DB 대조 역제안(예산 내 TOP3 나열, 스펙 미보유 시 근접 대안, 예산 부족 시 최저가·부족액)과 담기 quickReplies로 응답한다. LLM은 부품 ID/가격을 만들지 않으며, OPENAI_API_KEY가 없으면 견적 추천 플로우에서는 428을 반환한다(그 외 강등 플로우는 LLM 실패 시 200 + warnings=[UNSUPPORTED_INTENT] 거절 응답).
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-BuildGraph-AI-Profile
          required: false
          description: 내부 live benchmark용 Build Chat profile override. 사용자 화면은 보내지 않는다.
          schema:
            type: string
            enum: [BUILD_CHAT_FAST, BUILD_CHAT_54_FAST, BUILD_CHAT_54_MINI_FAST]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiBuildChatRequest"
      responses:
        "200":
          description: 챗봇 추천 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiBuildChatResponse"
        "428":
          description: OPENAI_API_KEY 등 LLM 필수 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM 호출 실패 또는 JSON 계약 위반(견적 추천 플로우 한정 — 강등 플로우는 502 대신 200 거절 응답을 반환한다)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/recommendation-events:
    post:
      summary: 추천 행동 이벤트 수집
      description: 추천 노출, 클릭, 저장, 변경 적용, 거절 등 학습용 이벤트를 저장한다. AS 확정 negative label은 관리자 전용 API만 사용한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationEventRequest"
      responses:
        "201":
          description: 저장된 추천 이벤트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationEventDto"
        "400":
          description: 지원하지 않는 sourceSurface(허용값은 BUILD_CHAT, HOME_RECOMMENDED_PARTS) 또는 미지원 eventType
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: 관리자 전용 이벤트 타입(AS_CONFIRMED_NEGATIVE, ADMIN_*)은 관리자 API를 사용해야 함
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/recommendations/home-builds:
    get:
      summary: 홈 검증 추천 조합
      description: 홈의 기본 추천 카드에 사용할 200만원 예산 티어 조합을 반환한다. 8개 필수 카테고리가 완성되고 target 예산 밴드 안이며 compatibility, power, size, performance, price Tool이 모두 실행되고 FAIL이 없는 조합만 최대 3개 반환한다. 유효한 조합이 없으면 임의 부품 조합 대신 빈 배열을 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 서버 검증 완료 홈 추천 조합
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeRecommendedBuildsResponse"
  /api/recommendations/home-parts:
    get:
      summary: 홈 추천 부품 랭킹
      description: 홈 하단 인기 부품 랭킹 카드에 표시할 ACTIVE 내부 자산을 limit 기준으로 반환한다. 현재 홈 화면은 limit=8로 2줄 랭킹을 표시하고, limit을 생략하면 기본 4개를 반환한다. XGBoost scorer가 실패하면 deterministic fallback 랭킹을 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 4
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: 홈 추천 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeRecommendedPartsResponse"
  /api/admin/recommendation-feedback/as-tickets/{id}:
    post:
      summary: AS 티켓 기반 추천 negative label 확정
      description: 관리자가 AS 원인이 추천 조합/부품 선택과 관련 있다고 확정한 경우에만 학습 라벨과 선택적 AS_CONFIRMED_NEGATIVE 이벤트를 남긴다. as_tickets 상태와 cause_candidates, upgrade_candidates는 수정하지 않는다. 연결 부품/견적/recommendationId가 없거나 useForRecommendationTraining=false면 라벨만 저장하고 이벤트는 만들지 않는다. 같은 티켓 재확정 시 새 이벤트를 만들지 않고 기존 AS_CONFIRMED_NEGATIVE 이벤트의 part/build/recommendation 링크를 갱신하며 trainingEventCreated=false를 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAsRecommendationFeedbackRequest"
      responses:
        "201":
          description: 저장된 AS 확정 라벨과 선택적 negative 이벤트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAsRecommendationFeedbackResponse"
        "400":
          description: logSummaryId가 해당 티켓 소속 로그 요약이 아님
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/recommendation-feedback/home-parts:
