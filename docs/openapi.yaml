      summary: 추천 학습 Job 생성
      description: LOCKED dataset으로 QUEUED Job을 생성한다. 실제 학습은 xgb-reranker worker가 수행한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [datasetId]
              properties:
                datasetId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: 생성된 학습 Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingJobDto"
  /api/admin/recommendation-models/{id}/activate:
    post:
      summary: 추천 모델 활성화
      description: 학습 워커가 holdout 평가 지표(metrics.holdout)를 기록한 SHADOW 모델만 scorer reload 성공 시 ACTIVE로 전환하고, 기존 ACTIVE 모델은 자동으로 RETIRED 처리한다. 활성화 즉시 홈 서빙이 동기 XGBoost 스코어링으로 전환된다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 활성화된 모델
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelVersionDto"
        "400":
          description: artifactPath가 없는 모델
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: SHADOW 모델이 아니거나, holdout 평가 지표가 기록되지 않은 모델(최신 학습 워커로 재훈련 필요)이거나, 모델이 현재 서빙 스코어러의 피처 계약과 다른 스키마로 훈련된 경우(학습-서빙 스큐), 또는 scorer reload에 실패한 경우
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/recommendation-models/{id}/retire:
    post:
      summary: 추천 모델 은퇴
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 은퇴한 모델
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelVersionDto"
  /api/admin/build-graph-layouts/default:
    get:
      summary: 기본 견적 관계도 배치 조회
      description: 관리자 화면에서 고정한 category 기준 견적 관계도 좌표를 조회한다. 저장값이 없으면 기본 좌표를 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 견적 관계도 배치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphLayoutDto"
    put:
      summary: 기본 견적 관계도 배치 저장
      description: 관리자 화면에서 드래그로 조정한 category 기준 견적 관계도 좌표를 저장한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildGraphLayoutSaveRequest"
      responses:
        "200":
          description: 저장된 견적 관계도 배치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphLayoutDto"
        "400":
          description: 좌표 request validation 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: 기본 견적 관계도 배치 초기화
      description: 저장된 견적 관계도 배치를 삭제하고 기본 좌표로 되돌린다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 초기화된 기본 견적 관계도 배치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphLayoutDto"
  /api/build-graphs/resolve:
    post:
      summary: Build 관계 그래프 계산
      description: AI 추천 조합 또는 현재 셀프견적 장바구니를 기준으로 부품 간 호환성, 전력, 규격, 성능, 가격 관계 그래프를 반환한다. 서버는 전달된 가격/부품명을 신뢰하지 않고 partId와 현재 quote draft를 기준으로 DB를 다시 조회한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildGraphResolveRequest"
      responses:
        "200":
          description: 관계 그래프 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphResolveResponse"
        "400":
          description: source, partId, category 등 request validation 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 활성 부품 또는 사용자 견적초안을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/parts:
    get:
      summary: 부품 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: q
          schema:
            type: string
          description: 부품명, 제조사, attributes JSON 검색어
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/GenericStatus"
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sort
          schema:
            type: string
            enum: [category, price_asc, price_desc, name, compatibility]
        - in: query
          name: compatibilitySource
          description: 특정 category 조회에서 현재 견적초안 기준 호환성 상태를 PartDto.compatibility에 포함한다. sort=compatibility와 함께 사용할 수 있다.
          schema:
            type: string
            enum: [QUOTE_DRAFT_CURRENT]
        - in: query
          name: compatibilityMode
          description: 호환 평가 시 후보의 담기/교체 의미론. REPLACE(기본)는 같은 카테고리를 후보로 교체한 상태로, ADD는 현재 구성을 유지한 채 후보를 더한 상태로 평가한다(RAM 등 복수 장착 카테고리의 슬롯 합산 반영). compatibilitySource+category 없이 오면 무시된다. 호환 평가가 켜진 요청에서 ADD와 replaceTargetPartId 동시 지정은 400.
          schema:
            type: string
            enum: [ADD, REPLACE]
            default: REPLACE
        - in: query
          name: replaceTargetPartId
          description: REPLACE 모드에서 교체 대상 부품 id. 지정하면 해당 행만 제외하고 평가하며, 생략하면 카테고리 전체를 제외한다(기존 동작).
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPage"
  /api/parts/compatible-candidates:
    post:
      summary: 현재 조합 기준 호환 부품 후보
      description: 그래프 노드 클릭 시 같은 카테고리 후보를 현재 AI_BUILD 또는 현재 견적초안 기준으로 Tool 검증해 반환한다. FAIL 후보는 기본 목록에서 제외하고 rejectedCount에 반영한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompatiblePartCandidateRequest"
      responses:
        "200":
          description: 호환 후보 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatiblePartCandidateResponse"
  /api/parts/{id}:
    get:
      summary: 부품 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 부품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartDto"
  /api/parts/{id}/price-history:
    get:
      summary: 부품 가격 이력
      description: 저장된 price_snapshots를 기준으로 상품별 가격변동 추이를 조회한다. 외부 검색 API를 실시간 호출하지 않는다. source를 생략하면 네이버 현재가 이력, 다나와 백업, 다나와 월별 추이, 수동 seed를 함께 반환할 수 있다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 3650
            default: 90
        - in: query
          name: source
          schema:
            type: string
          description: "특정 가격 출처만 조회할 때 사용한다. 생략하면 NAVER_SHOPPING_SEARCH, DANAWA_BACKUP, DANAWA_PRICE_TREND, MANUAL_CURRENT_LINEUP 등 저장된 전체 이력을 조회한다."
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        "200":
          description: 부품 가격 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPriceHistoryResponse"
  /api/quote-drafts/current:
    get:
      summary: 현재 로그인 사용자의 수동 견적초안
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 견적초안. active draft가 없으면 status=EMPTY로 반환한다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/quote-drafts/current/apply-ai-build:
    put:
      summary: AI 추천 조합을 현재 견적초안에 batch 적용
      description: conflictPolicy=REPLACE만 지원한다. 현재 active 견적초안의 모든 항목을 soft delete한 뒤 요청 items를 하나의 AI 추천 조합으로 다시 담는다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiBuildApplyRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/quote-drafts/current/items/{partId}:
    put:
      summary: 견적초안에 부품 담기 또는 같은 카테고리 교체
      security:
        - bearerAuth: []
      parameters:
        - in: path
