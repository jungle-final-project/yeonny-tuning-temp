        - bearerAuth: []
      responses:
        "200":
          description: 모델 버전 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelVersionsResponse"
  /api/admin/recommendation-models/summary:
    get:
      summary: 추천 모델 운영 요약
      description: 홈 추천부품 XGBoost scorer 운영 상태, 최근 HOME 추천 이벤트, score source 비율과 shadow score 수를 관리자 대시보드용으로 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 추천 모델 운영 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelSummaryResponse"
  /api/admin/recommendation-shadow/summary:
    get:
      summary: Shadow 비교 관측 (M4)
      description: 최근 days일 HOME/PART shadow 실모델 점수를 스코어링 회차별로 묶어, features로 재구성한 baseline 순위 대비 모델 순위의 역전율·top-4 교체율을 집계한다. baseline-shadow·BUILD_CHAT·중복 회차는 제외된다. 승급 전 "모델이 순위를 얼마나 바꾸는가"의 판단 근거.
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 7
          description: 집계 창(일). 1~30으로 클램프된다.
      responses:
        "200":
          description: shadow 비교 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationShadowSummaryResponse"
  /api/admin/recommendation-drift:
    get:
      summary: Drift 스냅샷 목록 (M3)
      description: 최근 days일 드리프트 스냅샷(카탈로그 피처 PSI·예측 drift PSI·운영 지표·경보) 목록을 최신순으로 반환한다. 일일 스케줄러가 recommendation_drift_snapshots에 기록한다(스케줄러 미활성 시 빈 목록).
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
