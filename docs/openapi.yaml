        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: status
          schema:
            type: string
            enum: [ACTIVE, INACTIVE, DISCONTINUED, DELETED]
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: includeDeleted
          schema:
            type: boolean
            default: false
        - in: query
          name: page
          schema:
            type: integer
            default: 0
        - in: query
          name: size
          schema:
            type: integer
            default: 20
            maximum: 100
        - in: query
          name: sort
          schema:
            type: string
            enum: [category, updated_desc, price_asc, price_desc, name]
      responses:
        "200":
          description: 관리자 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartPage"
    post:
      summary: 관리자 부품 수동 생성
      description: 새 부품을 INACTIVE 초안으로 생성한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPartUpsertRequest"
      responses:
        "200":
          description: 생성된 부품
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDto"
  /api/admin/parts/quality-report:
    get:
      summary: 관리자 내부 자산 품질 리포트
      description: ACTIVE 내부 자산 기준으로 Tool-ready 누락, 필수 스펙 누락, benchmark 누락, FPS coverage gap, alias 검수 큐를 읽기 전용으로 집계한다. 사용자 부품 API 응답은 바꾸지 않는다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 내부 자산 품질 리포트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartQualityReportResponse"
  /api/admin/parts/{id}:
    get:
      summary: 관리자 부품 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 관리자 부품 상세
