      responses:
        "200":
          description: 갱신된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}/items/bulk-exclude:
    post:
      summary: 추천 학습 데이터셋 item 일괄 제외
