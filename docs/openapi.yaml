        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
    patch:
      summary: 견적초안 부품 수량 변경
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDraftItemUpsertRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
    delete:
      summary: 견적초안에서 부품 제거
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/price-alerts:
    get:
