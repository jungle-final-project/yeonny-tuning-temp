openapi: 3.0.3
info:
  title: BuildGraph AI MVP API
  version: 0.2.0
  description: BuildGraph 3주 MVP 공통 API 계약. 상세 기준은 docs/API_CONTRACT.md를 따른다.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: API 상태 확인
      security: []
      responses:
        "200":
          description: 정상 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: DB 연결 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/demo/manufacturer-release-feed.xml:
    get:
      summary: 로컬 제조사 신제품 감지 데모 RSS
      description: 운영 source가 아니라 관리자 신제품 감지 데모용 read-only RSS feed다. scan을 누르면 manufacturer_posts에 게시글이 기록되고, 네이버 API가 설정된 경우 part_catalog_candidates 후보 생성까지 이어진다.
      security: []
      responses:
        "200":
          description: 데모 RSS feed
          content:
            application/xml:
              schema:
                type: string
  /api/users:
    post:
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 생성된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/login:
    post:
      summary: 이메일 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      summary: access token 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 재발급된 token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /api/auth/logout:
    post:
      security:
        - bearerAuth: []
      summary: 로그아웃
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: 로그아웃 완료
  /api/auth/me:
    get:
      summary: 현재 사용자 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/google/start:
    get:
      summary: Google OAuth 시작
      security: []
      responses:
        "302":
          description: Google OAuth로 redirect
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback
      security: []
      responses:
        "302":
          description: 프론트 callback route로 redirect
  /api/auth/exchange:
    post:
      summary: OAuth one-time code 교환
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthExchangeRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/requirements/parse:
    post:
      summary: 자연어 요구사항 파싱
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementParseRequest"
      responses:
        "200":
          description: 파싱된 요구사항
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementDto"
  /api/builds/recommend:
    post:
      summary: 추천 Build 생성
      description: 내부 자산 후보와 Tool 검증으로 Build를 생성하고 Agent worker 실행을 큐에 넣는다. 응답의 agentSessionId는 즉시 반환되지만 worker 완료 전 evidenceIds와 toolResults는 비어 있을 수 있다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRecommendRequest"
      responses:
        "200":
          description: 추천 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRecommendResponse"
  /api/builds/from-chat:
    post:
      summary: AI 챗봇 임시 추천 Build 저장
      description: sessionStorage에만 있던 AI 챗봇 추천 조합을 사용자가 저장할 때 requirements, builds, build_items에 저장한다. AI/RAG를 다시 호출하지 않고 partId/category를 서버 DB와 대조한 뒤 Tool 검증은 저장 시 다시 실행한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildSaveFromChatRequest"
      responses:
        "200":
          description: 저장된 Build id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildSaveFromChatResponse"
  /api/builds/{id}:
    get:
      summary: Build 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
  /api/builds/history:
    get:
      summary: 내 Build 이력
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Build 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildPage"
  /api/builds/{id}/change-part:
    post:
      summary: Build 부품 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePartRequest"
      responses:
        "200":
          description: 부품 변경 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePartResponse"
  /api/ai/build-chat:
    post:
      summary: AI 챗봇 LLM/RAG 기반 Build 추천
      description: 축소된 Build Chat. 지원 범위는 예산/현재 견적 기반 추천 조합 생성, 부품 교체 성능 시뮬레이션, 명확화 질문뿐이다. 화면 이동, 견적초안 조작, 단일 부품 추천, 일반 상담 요청은 고정 안내 메시지(GENERAL)로 응답한다. LLM은 부품 ID/가격을 만들지 않으며, OPENAI_API_KEY가 없으면 428을 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-BuildGraph-AI-Profile
          required: false
          description: 내부 live benchmark용 Build Chat profile override. 사용자 화면은 보내지 않는다.
          schema:
            type: string
            enum: [BUILD_CHAT_FAST, BUILD_CHAT_54_FAST, BUILD_CHAT_54_MINI_FAST]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiBuildChatRequest"
      responses:
        "200":
          description: 챗봇 추천 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiBuildChatResponse"
        "428":
          description: OPENAI_API_KEY 등 LLM 필수 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM 호출 실패 또는 JSON 계약 위반
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/recommendation-events:
    post:
      summary: 추천 행동 이벤트 수집
      description: 추천 노출, 클릭, 저장, 변경 적용, 거절 등 학습용 이벤트를 저장한다. AS 확정 negative label은 관리자 전용 API만 사용한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationEventRequest"
      responses:
        "201":
          description: 저장된 추천 이벤트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationEventDto"
  /api/recommendations/home-parts:
    get:
      summary: 홈 추천 부품 랭킹
      description: 홈 하단 인기 부품 랭킹 카드에 표시할 ACTIVE 내부 자산을 limit 기준으로 반환한다. 현재 홈 화면은 limit=8로 2줄 랭킹을 표시하고, limit을 생략하면 기본 4개를 반환한다. XGBoost scorer가 실패하면 deterministic fallback 랭킹을 반환한다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 4
            minimum: 1
            maximum: 12
      responses:
        "200":
          description: 홈 추천 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeRecommendedPartsResponse"
  /api/admin/recommendation-feedback/as-tickets/{id}:
    post:
      summary: AS 티켓 기반 추천 negative label 확정
      description: 관리자가 AS 원인이 추천 조합/부품 선택과 관련 있다고 확정한 경우에만 학습 라벨과 선택적 AS_CONFIRMED_NEGATIVE 이벤트를 남긴다. as_tickets 상태와 cause_candidates, upgrade_candidates는 수정하지 않는다. 연결 부품/견적/recommendationId가 없거나 useForRecommendationTraining=false면 라벨만 저장하고 이벤트는 만들지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAsRecommendationFeedbackRequest"
      responses:
        "201":
          description: 저장된 AS 확정 라벨과 선택적 negative 이벤트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAsRecommendationFeedbackResponse"
  /api/admin/recommendation-feedback/home-parts:
    post:
      summary: 홈 추천부품 관리자 라벨 저장
      description: 관리자가 홈 추천부품 학습용 promote/demote 라벨을 저장한다. 부품 상태나 사용자 노출 여부는 변경하지 않는다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminHomePartRecommendationFeedbackRequest"
      responses:
        "201":
          description: 저장된 관리자 홈 추천부품 피드백 이벤트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationEventDto"
  /api/admin/recommendation-models:
    get:
      summary: 추천 reranker 모델 버전 조회
      description: XGBoost shadow scoring과 batch 학습으로 생성된 모델 버전/metric을 조회한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 모델 버전 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelVersionsResponse"
  /api/admin/recommendation-models/summary:
    get:
      summary: 추천 모델 운영 요약
      description: 홈 추천부품 XGBoost scorer 운영 상태, 최근 HOME 추천 이벤트, score source 비율과 shadow score 수를 관리자 대시보드용으로 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 추천 모델 운영 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelSummaryResponse"
  /api/admin/recommendation-training/overview:
    get:
      summary: 추천 학습 운영 요약
      description: HOME 추천 이벤트 중 학습 eligible, 성공 학습 투입, 미투입, 제외, 최근 Job과 활성 모델을 집계한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 추천 학습 운영 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingOverviewResponse"
  /api/admin/recommendation-training-datasets:
    get:
      summary: 추천 학습 데이터셋 목록
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 데이터셋 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetsResponse"
    post:
      summary: 추천 학습 데이터셋 생성
      description: HOME 추천 이벤트와 관리자 HOME 라벨을 필터 기준으로 snapshot한다. 생성 상태는 DRAFT다.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationTrainingDatasetCreateRequest"
      responses:
        "201":
          description: 생성된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}:
    patch:
      summary: 추천 학습 데이터셋 수정
      description: DRAFT 데이터셋 이름만 수정한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: 수정된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}/lock:
    post:
      summary: 추천 학습 데이터셋 잠금
      description: DRAFT 데이터셋을 학습 Job 생성 가능한 LOCKED 상태로 바꾼다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 잠긴 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}/archive:
    post:
      summary: 추천 학습 데이터셋 보관
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 보관된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}/items:
    get:
      summary: 추천 학습 데이터셋 item 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 데이터셋 item 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetItemsResponse"
  /api/admin/recommendation-training-datasets/{id}/items/bulk-include:
    post:
      summary: 추천 학습 데이터셋 item 일괄 포함
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationTrainingDatasetBulkUpdateRequest"
      responses:
        "200":
          description: 갱신된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}/items/bulk-exclude:
    post:
      summary: 추천 학습 데이터셋 item 일괄 제외
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationTrainingDatasetBulkUpdateRequest"
      responses:
        "200":
          description: 갱신된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-jobs:
    get:
      summary: 추천 학습 Job 목록
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 학습 Job 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingJobsResponse"
    post:
      summary: 추천 학습 Job 생성
      description: LOCKED dataset으로 QUEUED Job을 생성한다. 실제 학습은 xgb-reranker worker가 수행한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [datasetId]
              properties:
                datasetId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: 생성된 학습 Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingJobDto"
  /api/admin/recommendation-models/{id}/activate:
    post:
      summary: 추천 모델 활성화
      description: scorer reload 성공 후 선택 모델을 ACTIVE로, 기존 ACTIVE 모델을 RETIRED로 변경한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 활성화된 모델
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelVersionDto"
  /api/admin/recommendation-models/{id}/retire:
    post:
      summary: 추천 모델 은퇴
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 은퇴한 모델
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationModelVersionDto"
  /api/admin/build-graph-layouts/default:
    get:
      summary: 기본 견적 관계도 배치 조회
      description: 관리자 화면에서 고정한 category 기준 견적 관계도 좌표를 조회한다. 저장값이 없으면 기본 좌표를 반환한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 견적 관계도 배치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphLayoutDto"
    put:
      summary: 기본 견적 관계도 배치 저장
      description: 관리자 화면에서 드래그로 조정한 category 기준 견적 관계도 좌표를 저장한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildGraphLayoutSaveRequest"
      responses:
        "200":
          description: 저장된 견적 관계도 배치
          content:
            application/json:
              schema:
