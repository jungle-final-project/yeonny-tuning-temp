    get:
      summary: 관리자 내부 자산 품질 리포트
      description: ACTIVE 내부 자산 기준으로 Tool-ready 누락, 필수 스펙 누락, benchmark 누락, FPS coverage gap, alias 검수 큐를 읽기 전용으로 집계한다. 사용자 부품 API 응답은 바꾸지 않는다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 내부 자산 품질 리포트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartQualityReportResponse"
  /api/admin/parts/{id}:
    get:
      summary: 관리자 부품 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 관리자 부품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDto"
    patch:
      summary: 관리자 부품 수정
      description: 기본 정보, 상태, 카테고리별 스펙 JSON을 수정한다. ACTIVE 전환은 필수 스펙 validator를 통과해야 한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPartUpsertRequest"
      responses:
        "200":
          description: 수정된 부품
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDto"
    delete:
      summary: 관리자 부품 soft delete
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 삭제 처리 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDeleteResponse"
