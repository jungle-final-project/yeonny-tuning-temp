        "200":
          description: 실행 이력 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineJobRunListResponse"
  /api/admin/price-jobs:
    get:
      summary: 관리자 가격 수집 작업 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 가격 수집 작업 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobPage"
  /api/admin/price-jobs/run:
    post:
      summary: 가격 수집 작업 실행
      description: active QUEUED/RUNNING job이 없으면 QUEUED job을 만들고 RabbitMQ worker에 price.refresh 메시지를 발행한다. worker는 전 카테고리 네이버 가격을 순회 갱신하며(refreshDailyOffers), 다나와 스냅샷은 part.danawa-refresh.enabled가 켜진 경우에만 함께 수집한다.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: 생성된 가격 수집 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobDto"
        "409":
          description: 이미 QUEUED 또는 RUNNING 가격 Job이 있거나, 데모 동결(DEMO_FREEZE_MUTATIONS=true)이 켜져 있는 경우
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
