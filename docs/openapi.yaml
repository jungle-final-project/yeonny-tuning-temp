        "201":
          description: 저장된 관리자 홈 추천부품 피드백 이벤트
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationEventDto"
  /api/admin/recommendation-models:
    get:
      summary: 추천 reranker 모델 버전 조회
      description: XGBoost shadow scoring과 batch 학습으로 생성된 모델 버전/metric을 조회한다.
