components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    ToolCheckRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckRequest"
  responses:
    ToolCheckSuccess:
      description: Tool check 결과
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_STATE, DUPLICATE_RESOURCE, FILE_VALIDATION_ERROR, PRECONDITION_REQUIRED, UPSTREAM_ERROR, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: object
          description: >
            Tool-specific detail object. For performance Tool responses this may include
            cpuBenchmarkScore, gpuBenchmarkScore, and gameFpsEvidence items shaped
            like GameFpsEvidenceDto. gameFpsEvidenceStatus is included only when
            gameFpsEvidence has at least one row.
          additionalProperties: true
    GameFpsEvidenceDto:
      type: object
      required: [id, gameTitle, gameKey, resolution, graphicsPreset, avgFps, sourceName, sourceUrl, confidence, match]
      properties:
        id:
          type: string
          format: uuid
        gameTitle:
          type: string
        gameKey:
          type: string
        resolution:
          type: string
          enum: [FHD, QHD, 4K]
        graphicsPreset:
          type: string
        avgFps:
          type: number
          format: double
        onePercentLowFps:
          type: number
          format: double
          nullable: true
        sourceName:
          type: string
        sourceUrl:
          type: string
        sourceCheckedAt:
          type: string
          format: date
        confidence:
          $ref: "#/components/schemas/Confidence"
        match:
          type: object
          required: [gameMatched, resolutionMatched, gpuClassMatched, cpuClassMatched, exactGpuPartMatched, exactCpuPartMatched, evidenceExactness]
          properties:
            requestedGameKey:
              type: string
              nullable: true
            requestedResolution:
              type: string
              nullable: true
            selectedCpuClass:
              type: string
              nullable: true
            selectedGpuClass:
              type: string
              nullable: true
            sourceCpuClass:
              type: string
              nullable: true
            sourceGpuClass:
              type: string
              nullable: true
            hardwareScope:
              type: string
              nullable: true
            gameMatched:
              type: boolean
            resolutionMatched:
              type: boolean
            cpuClassMatched:
              type: boolean
            gpuClassMatched:
              type: boolean
            exactCpuPartMatched:
              type: boolean
            exactGpuPartMatched:
              type: boolean
            evidenceExactness:
              type: string
        sourceContext:
          type: object
          additionalProperties: true
        notes:
          type: string
          nullable: true
        guaranteePolicy:
          type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP, DOWN]
          example: UP
        database:
          type: string
          enum: [UP, UNKNOWN]
          example: UP
    Role:
      type: string
      enum: [USER, ADMIN]
    GenericStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
    ToolStatus:
      type: string
      enum: [PASS, WARN, FAIL]
    Confidence:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    PartCategory:
      type: string
      enum: [CPU, GPU, RAM, MOTHERBOARD, STORAGE, PSU, CASE, COOLER]
    AgentSessionStatus:
      type: string
      enum: [QUEUED, RUNNING, RAG_SEARCHED, TOOLS_CALLED, SUMMARY_READY, FALLBACK_READY, SUCCEEDED, FAILED, CANCELLED]
    AsTicketStatus:
      type: string
      enum: [OPEN, ASSIGNED, IN_PROGRESS, RESOLVED, CLOSED, CANCELLED]
    LogUploadStatus:
      type: string
      enum: [UPLOADED, PROCESSING, FAILED]
    PriceAlertStatus:
      type: string
      enum: [ACTIVE, TRIGGERED, DISABLED]
    PriceJobStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED]
    UserDto:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
    SignupRequest:
      type: object
      required: [email, password, name, termsAccepted, marketingAccepted]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        termsAccepted:
          type: boolean
        marketingAccepted:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserDto"
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    AuthExchangeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    RequirementParseRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        resolution:
          type: string
        preferredVendors:
          type: array
          items:
            type: string
        priority:
          type: string
    RequirementDto:
      type: object
      required: [id, rawMessage]
      properties:
        id:
          type: string
          format: uuid
        rawMessage:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        parsedContext:
          type: object
          additionalProperties: true
        questions:
          type: array
          items:
            $ref: "#/components/schemas/RequirementQuestionDto"
        agentSessionId:
          type: string
          format: uuid
          nullable: true
        agentSummary:
          type: string
          nullable: true
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
    RequirementQuestionDto:
      type: object
      required: [key, label, options, required]
      properties:
        key:
          type: string
        label:
          type: string
        options:
          type: array
          items:
            type: string
        required:
          type: boolean
    BuildRecommendRequest:
      type: object
      required: [requirementId]
      properties:
        requirementId:
          type: string
          format: uuid
        answers:
          type: object
          additionalProperties:
            type: string
    BuildRecommendResponse:
      type: object
      required: [agentSessionId, recommendations, warnings, evidenceIds]
      properties:
        agentSessionId:
          type: string
          format: uuid
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/BuildDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          items:
            type: string
