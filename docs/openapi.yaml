  /api/agent/devices/register:
    post:
      summary: PC Agent 데모 디바이스 등록
      description: activation token으로 agent 디바이스를 등록하고 이후 /api/agent/* 호출에 쓸 agent token을 발급한다. agent.demo-activation-token(AGENT_DEMO_ACTIVATION_TOKEN)이 비어 있으면(프로덕션 기본) 데모 등록 경로 자체가 비활성화되어 401을 반환한다.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required: [activationToken, userEmail]
              properties:
                activationToken:
                  type: string
                userEmail:
                  type: string
                deviceFingerprintHash:
                  type: string
                hostnameHash:
                  type: string
                  nullable: true
                registrationIdempotencyKey:
                  type: string
                osVersion:
                  type: string
                agentVersion:
                  type: string
                policyVersion:
                  type: string
      responses:
        "201":
          description: 등록된 디바이스와 발급된 agent token (deviceId, status, agentToken, tokenType)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: userEmail 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: activation token 불일치 또는 데모 등록 비활성(agent.demo-activation-token 미설정)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: userEmail에 해당하는 사용자 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/agent/consents:
    post:
      summary: PC Agent 업로드 동의 저장
      description: agent token으로 SERVER_UPLOAD 등 동의(accepted=true) 또는 철회(accepted=false)를 기록한다. 서버 업로드 동의가 없으면 /api/agent/log-uploads가 400으로 거부된다.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                consentType:
                  type: string
                  default: SERVER_UPLOAD
                policyVersion:
                  type: string
                accepted:
                  type: boolean
                  default: true
      responses:
        "200":
          description: 저장된 동의 (id, consentType, policyVersion, accepted, acceptedAt, revokedAt)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/heartbeat:
    post:
      summary: PC Agent heartbeat
      description: agent token으로 디바이스 last_seen_at과 agent/policy 버전을 갱신하고 heartbeat 이력을 남긴다.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                agentVersion:
                  type: string
                policyVersion:
                  type: string
                  nullable: true
                serviceStatus:
                  type: string
                  default: RUNNING
                trayStatus:
                  type: string
                  nullable: true
      responses:
        "200":
          description: 기록된 heartbeat (id, deviceId, status, receivedAt, pendingCommands)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /api/agent/log-uploads:
    post:
      summary: PC Agent gzip JSONL 로그 업로드와 AS 티켓 생성
      description: PC Agent가 agent token으로 gzip JSONL incident window를 업로드한다. 서버는 envelope, privacy flag, gzip/JSONL을 검증하고 raw gzip을 보존한 뒤 요약 피처와 AS 티켓을 생성한다. raw line은 학습 row에 직접 복사하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PcAgentLogUploadRequest"
      responses:
        "201":
          description: 생성된 업로드 Job, 로그 업로드, 요약, AS 티켓 id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PcAgentLogUploadResponse"
        "400":
          description: consent 누락, gzip/JSONL/envelope/privacy validation 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
