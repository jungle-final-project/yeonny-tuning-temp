          name: includeDeleted
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 제조사 source 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerSourceListResponse"
    post:
      summary: 제조사 신제품 감지 source 생성
      security:
        - bearerAuth: []
      requestBody:
