    post:
      summary: 제조사 게시글 AI 구조화 및 후보 생성 (검수 대기)
      description: AI가 공식 게시글 본문을 구조화해 신제품 여부, 검색어, 카테고리별 specAttributes 초안을 추출하고 네이버 검색 후보를 만들거나 기존 후보에 동기화한다. INACTIVE 내부 자산 초안 연결은 자동으로 수행하지 않으며, 관리자가 후보 검수 후 /api/admin/part-catalog-candidates/{id}/approve 로 별도 승인해야 한다(응답의 partId/partStatus는 항상 null).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: AI 자산 초안화 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManufacturerPostAiAssetDraftResponse"
        "428":
          description: OPENAI_API_KEY 등 AI 선행 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: AI JSON 계약 위반 또는 외부 LLM 호출 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
