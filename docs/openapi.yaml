openapi: 3.0.3
info:
  title: BuildGraph AI MVP API
  version: 0.2.0
  description: BuildGraph 3주 MVP 공통 API 계약. 상세 기준은 docs/API_CONTRACT.md를 따른다.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: API 상태 확인
      security: []
      responses:
        "200":
          description: 정상 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/users:
    post:
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 생성된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/login:
    post:
      summary: 이메일 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      summary: access token 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 재발급된 token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /api/auth/logout:
    post:
      summary: 로그아웃
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: 로그아웃 완료
  /api/auth/me:
    get:
      summary: 현재 사용자 조회
      responses:
        "200":
          description: 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/google/start:
    get:
      summary: Google OAuth 시작
      security: []
      responses:
        "302":
          description: Google OAuth로 redirect
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback
      security: []
      responses:
        "302":
          description: 프론트 callback route로 redirect
  /api/auth/exchange:
    post:
      summary: OAuth one-time code 교환
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthExchangeRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/requirements/parse:
    post:
      summary: 자연어 요구사항 파싱
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementParseRequest"
      responses:
        "200":
          description: 파싱된 요구사항
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementDto"
  /api/builds/recommend:
    post:
      summary: 추천 Build 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRecommendRequest"
      responses:
        "200":
          description: 추천 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRecommendResponse"
  /api/builds/{id}:
    get:
      summary: Build 상세 조회
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
  /api/builds/history:
    get:
      summary: 내 Build 이력
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Build 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildPage"
  /api/builds/{id}/change-part:
    post:
      summary: Build 부품 변경
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePartRequest"
      responses:
        "200":
          description: 부품 변경 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePartResponse"
  /api/parts:
    get:
      summary: 부품 목록
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: q
          schema:
            type: string
          description: 부품명, 제조사, attributes JSON 검색어
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/GenericStatus"
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sort
          schema:
            type: string
            enum: [category, price_asc, price_desc, name]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPage"
  /api/parts/{id}:
    get:
      summary: 부품 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 부품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartDto"
  /api/price-alerts:
    get:
      summary: 목표가 알림 목록
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 목표가 알림 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertPage"
    post:
      summary: 목표가 알림 등록
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceAlertCreateRequest"
      responses:
        "201":
          description: 생성된 알림
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertDto"
  /api/admin/price-jobs:
    get:
      summary: 관리자 가격 수집 작업 목록
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 가격 수집 작업 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobPage"
  /api/admin/price-jobs/run:
    post:
      summary: 가격 수집 작업 실행
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceJobRunRequest"
      responses:
        "201":
          description: 생성된 가격 수집 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobDto"
  /api/tools/compatibility/check:
    post:
      summary: 호환성 Tool check
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/power/check:
    post:
      summary: 전력 Tool check
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/size/check:
    post:
      summary: 규격 Tool check
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/performance/check:
    post:
      summary: 성능 Tool check
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/price/check:
    post:
      summary: 가격 Tool check
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/agent/sessions:
    post:
      summary: Agent 세션 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSessionCreateRequest"
      responses:
        "201":
          description: 생성된 Agent 세션
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDto"
  /api/agent/sessions/{id}/run:
    post:
      summary: Agent 세션 실행 시작
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: RUNNING 상태로 전이된 Agent 세션
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDto"
  /api/agent/sessions/{id}:
    get:
      summary: Agent 세션 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Agent 세션 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDto"
  /api/rag/search:
    get:
      summary: RAG 근거 검색
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: RAG 근거 후보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEvidencePage"
  /api/rag/evidence/{id}:
    get:
      summary: RAG 근거 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: RAG 근거 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEvidenceDto"
  /api/agent-logs/upload:
    post:
      summary: PC Agent JSONL 로그 업로드
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AgentLogUploadRequest"
      responses:
        "201":
          description: 업로드된 로그 메타데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLogUploadDto"
  /api/agent-logs/{id}:
    get:
      summary: Agent 로그 업로드 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 로그 업로드 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLogUploadDto"
  /api/as-tickets:
    post:
      summary: AS 티켓 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsTicketCreateRequest"
      responses:
        "201":
          description: 생성된 AS 티켓
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
  /api/as-tickets/{id}:
    get:
      summary: AS 티켓 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: AS 티켓 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
  /api/admin/dashboard:
    get:
      summary: 관리자 대시보드
      responses:
        "200":
          description: 관리자 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardDto"
  /api/admin/audit-logs/recent:
    get:
      summary: 최근 관리자 감사 로그
      responses:
        "200":
          description: 최근 감사 로그
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"
  /api/admin/agent-sessions:
    get:
      summary: 관리자 Agent 세션 목록
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Agent 세션 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionPage"
  /api/admin/agent-sessions/{id}:
    get:
      summary: 관리자 Agent 세션 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Agent 세션 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAgentSessionDto"
  /api/admin/tool-invocations:
    get:
      summary: 관리자 Tool 호출 목록
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Tool 호출 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvocationPage"
  /api/admin/tool-invocations/{id}:
    get:
      summary: 관리자 Tool 호출 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Tool 호출 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvocationDto"
  /api/admin/rag-evidence/{id}:
    get:
      summary: 관리자 RAG 근거 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 관리자 RAG 근거 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRagEvidenceDto"
  /api/admin/as-tickets:
    get:
      summary: 관리자 AS 티켓 목록
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: AS 티켓 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketPage"
  /api/admin/as-tickets/{id}:
    get:
      summary: 관리자 AS 티켓 상세
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 관리자 AS 티켓 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
    patch:
      summary: 관리자 AS 티켓 수정
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAsTicketUpdateRequest"
      responses:
        "200":
          description: 수정된 AS 티켓
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    ToolCheckRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckRequest"
  responses:
    ToolCheckSuccess:
      description: Tool check 결과
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_STATE, DUPLICATE_RESOURCE, FILE_VALIDATION_ERROR, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: UP
        database:
          type: string
          example: UP
    Role:
      type: string
      enum: [USER, ADMIN]
    GenericStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
    ToolStatus:
      type: string
      enum: [PASS, WARN, FAIL]
    Confidence:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    PartCategory:
      type: string
      enum: [CPU, GPU, RAM, MOTHERBOARD, STORAGE, PSU, CASE, COOLER]
    AgentSessionStatus:
      type: string
      enum: [QUEUED, RUNNING, RAG_SEARCHED, TOOLS_CALLED, SUMMARY_READY, FALLBACK_READY, SUCCEEDED, FAILED, CANCELLED]
    AsTicketStatus:
      type: string
      enum: [OPEN, ASSIGNED, IN_PROGRESS, RESOLVED, CLOSED, CANCELLED]
    LogUploadStatus:
      type: string
      enum: [UPLOADED, PROCESSING, FAILED]
    PriceAlertStatus:
      type: string
      enum: [ACTIVE, TRIGGERED, DISABLED]
    PriceJobStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED]
    UserDto:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
    SignupRequest:
      type: object
      required: [email, password, name, termsAccepted, marketingAccepted]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        termsAccepted:
          type: boolean
        marketingAccepted:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserDto"
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    AuthExchangeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    RequirementParseRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
    RequirementDto:
      type: object
      required: [id, rawMessage]
      properties:
        id:
          type: string
          format: uuid
        rawMessage:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        parsedContext:
          type: object
          additionalProperties: true
    BuildRecommendRequest:
      type: object
      required: [requirementId]
      properties:
        requirementId:
          type: string
          format: uuid
    BuildRecommendResponse:
      type: object
      required: [agentSessionId, recommendations, warnings, evidenceIds]
      properties:
        agentSessionId:
          type: string
          format: uuid
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/BuildDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
    BuildDto:
      type: object
      required: [id, name, totalPrice, confidence, items, warnings, evidenceIds, changeableCategories]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        totalPrice:
          type: integer
        confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/BuildItemDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
        changeableCategories:
          type: array
          items:
            $ref: "#/components/schemas/PartCategory"
        createdAt:
          type: string
          format: date-time
    BuildItemDto:
      type: object
      required: [category, partId, name, price]
      properties:
        category:
          $ref: "#/components/schemas/PartCategory"
        partId:
          type: string
          format: uuid
        name:
          type: string
        price:
          type: integer
    ChangePartRequest:
      type: object
      required: [category, partId]
      properties:
        category:
          $ref: "#/components/schemas/PartCategory"
        partId:
          type: string
          format: uuid
    ChangePartResponse:
      type: object
      required: [buildId, category, selectedPartId, totalPrice, diff, warnings]
      properties:
        buildId:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/PartCategory"
        previousPartId:
          type: string
          format: uuid
        selectedPartId:
          type: string
          format: uuid
        totalPrice:
          type: integer
        diff:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
    WarningDto:
