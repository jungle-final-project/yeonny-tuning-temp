    post:
      summary: 관리자 부품 복구
      description: soft delete를 해제하고 INACTIVE 초안으로 복구한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 복구된 부품
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPartDto"
