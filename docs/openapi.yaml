components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    ToolCheckRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckRequest"
  responses:
    ToolCheckSuccess:
      description: Tool check 결과
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_STATE, DUPLICATE_RESOURCE, FILE_VALIDATION_ERROR, PRECONDITION_REQUIRED, UPSTREAM_ERROR, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP, DOWN]
          example: UP
        database:
          type: string
          enum: [UP, UNKNOWN]
          example: UP
    Role:
      type: string
      enum: [USER, ADMIN]
    GenericStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
    ToolStatus:
      type: string
      enum: [PASS, WARN, FAIL]
    Confidence:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    PartCategory:
      type: string
      enum: [CPU, GPU, RAM, MOTHERBOARD, STORAGE, PSU, CASE, COOLER]
    AgentSessionStatus:
      type: string
      enum: [QUEUED, RUNNING, RAG_SEARCHED, TOOLS_CALLED, SUMMARY_READY, FALLBACK_READY, SUCCEEDED, FAILED, CANCELLED]
    AsTicketStatus:
      type: string
      enum: [OPEN, ASSIGNED, IN_PROGRESS, RESOLVED, CLOSED, CANCELLED]
    LogUploadStatus:
      type: string
      enum: [UPLOADED, PROCESSING, FAILED]
    PriceAlertStatus:
      type: string
      enum: [ACTIVE, TRIGGERED, DISABLED]
    PriceJobStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED]
    UserDto:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
    SignupRequest:
      type: object
      required: [email, password, name, termsAccepted, marketingAccepted]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        termsAccepted:
          type: boolean
        marketingAccepted:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserDto"
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    AuthExchangeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    RequirementParseRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        resolution:
          type: string
        preferredVendors:
          type: array
          items:
            type: string
        priority:
          type: string
    RequirementDto:
      type: object
      required: [id, rawMessage]
      properties:
        id:
          type: string
          format: uuid
        rawMessage:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        parsedContext:
          type: object
          additionalProperties: true
        questions:
          type: array
          items:
            $ref: "#/components/schemas/RequirementQuestionDto"
        agentSessionId:
          type: string
          format: uuid
          nullable: true
        agentSummary:
          type: string
          nullable: true
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
    RequirementQuestionDto:
      type: object
      required: [key, label, options, required]
      properties:
        key:
          type: string
        label:
          type: string
        options:
          type: array
          items:
            type: string
        required:
          type: boolean
    BuildRecommendRequest:
      type: object
      required: [requirementId]
      properties:
        requirementId:
          type: string
          format: uuid
        answers:
          type: object
          additionalProperties:
            type: string
    BuildRecommendResponse:
      type: object
      required: [agentSessionId, recommendations, warnings, evidenceIds]
      properties:
        agentSessionId:
          type: string
          format: uuid
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/BuildDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
        toolResults:
          type: array
          items:
            $ref: "#/components/schemas/ToolResultDto"
    BuildDto:
      type: object
      required: [id, name, totalPrice, confidence, items, warnings, evidenceIds, changeableCategories]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        recommendedFor:
          type: string
        summary:
          type: string
        totalPrice:
          type: integer
        confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/BuildItemDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
        changeableCategories:
          type: array
          items:
            $ref: "#/components/schemas/PartCategory"
        agentSessionId:
          type: string
          format: uuid
          nullable: true
        agentSummary:
          type: string
          nullable: true
        toolResults:
          type: array
          items:
            $ref: "#/components/schemas/ToolResultDto"
        createdAt:
          type: string
          format: date-time
    BuildItemDto:
      type: object
      required: [category, partId, name, price]
      properties:
        category:
          $ref: "#/components/schemas/PartCategory"
        partId:
          type: string
          format: uuid
        name:
          type: string
        manufacturer:
          type: string
          nullable: true
        price:
          type: integer
        attributes:
          type: object
          additionalProperties: true
    ChangePartRequest:
      type: object
      required: [category, partId]
      properties:
        category:
          $ref: "#/components/schemas/PartCategory"
        partId:
          type: string
          format: uuid
    ChangePartResponse:
      type: object
      required: [buildId, category, selectedPartId, totalPrice, diff, beforeBuild, afterBuild, diffRows, toolResults, warnings]
      properties:
        buildId:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/PartCategory"
        previousPartId:
          type: string
          format: uuid
        selectedPartId:
          type: string
          format: uuid
        totalPrice:
          type: integer
        diff:
          type: object
          additionalProperties: true
        beforeBuild:
          $ref: "#/components/schemas/BuildDto"
        afterBuild:
          type: object
          required: [id, name, totalPrice, items]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            totalPrice:
              type: integer
            items:
              type: array
              items:
                $ref: "#/components/schemas/BuildItemDto"
        diffRows:
          type: array
          items:
            $ref: "#/components/schemas/ChangePartDiffRowDto"
        toolResults:
          type: array
          items:
            $ref: "#/components/schemas/ToolResultDto"
        agentSessionId:
          type: string
          format: uuid
          nullable: true
        agentSummary:
          type: string
          nullable: true
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
    ChangePartDiffRowDto:
      type: object
      required: [label, before, after, diff, status]
      properties:
        label:
          type: string
        before:
          type: string
        after:
          type: string
        diff:
          type: string
        status:
          type: string
    ToolResultDto:
      type: object
      required: [tool, status, confidence, summary]
      properties:
        tool:
          type: string
        status:
          type: string
          enum: [PASS, WARN, FAIL]
        score:
          type: number
          format: double
        confidence:
          $ref: "#/components/schemas/Confidence"
        summary:
          type: string
        warnings:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ToolEvidenceDto"
        details:
          type: object
          additionalProperties: true
    ToolEvidenceDto:
      type: object
      required: [source_id, summary]
      properties:
        source_id:
          type: string
        summary:
          type: string
    WarningDto:
      type: object
      required: [code, message, severity]
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [WARN, FAIL]
        relatedPartIds:
          type: array
          items:
            type: string
            format: uuid
    PartDto:
      type: object
      required: [id, category, name, price, status, attributes]
      properties:
        id:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/PartCategory"
        name:
          type: string
        manufacturer:
          type: string
        price:
          type: integer
        status:
          $ref: "#/components/schemas/GenericStatus"
        attributes:
          type: object
          additionalProperties: true
        benchmarkSummary:
          type: object
          additionalProperties: true
        latestPriceSource:
          type: string
          nullable: true
        latestPriceCollectedAt:
          type: string
          format: date-time
          nullable: true
        externalOffer:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PartExternalOfferDto"
    PartExternalOfferDto:
      type: object
      properties:
        title:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        supplierName:
          type: string
          nullable: true
        offerUrl:
          type: string
          nullable: true
        lowPrice:
          type: integer
          nullable: true
        source:
          type: string
        refreshedAt:
          type: string
          format: date-time
          nullable: true
    QuoteDraftItemUpsertRequest:
      type: object
      description: CPU/GPU/MOTHERBOARD/PSU/CASE/COOLER are single-item categories. RAM and STORAGE can hold multiple distinct parts.
      properties:
        quantity:
          type: integer
          minimum: 1
          maximum: 9
          default: 1
          description: Single-item categories accept only 1. RAM and STORAGE accept 1 to 9.
    QuoteDraftDto:
      type: object
      required: [status, name, items, totalPrice, itemCount]
      properties:
        id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [EMPTY, ACTIVE, ORDERED, ARCHIVED]
        name:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/QuoteDraftItemDto"
        totalPrice:
          type: integer
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    QuoteDraftItemDto:
      type: object
      required: [id, partId, category, name, quantity, unitPriceAtAdd, currentPrice, lineTotal]
      properties:
        id:
          type: string
          format: uuid
        partId:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/PartCategory"
        name:
          type: string
        manufacturer:
          type: string
          nullable: true
        quantity:
          type: integer
        unitPriceAtAdd:
          type: integer
        currentPrice:
          type: integer
        lineTotal:
          type: integer
        attributes:
          type: object
          additionalProperties: true
        externalOffer:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PartExternalOfferDto"
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    PartPriceHistoryResponse:
      type: object
      required: [partId, partName, currentPrice, days, items, summary]
      properties:
        partId:
          type: string
          format: uuid
        partName:
          type: string
        currentPrice:
          type: integer
        days:
          type: integer
        source:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PriceHistoryPoint"
        summary:
          $ref: "#/components/schemas/PriceHistorySummary"
    PriceHistoryPoint:
      type: object
      required: [price, source, collectedAt]
      properties:
        price:
          type: integer
        source:
          type: string
        collectedAt:
          type: string
          format: date-time
    PriceHistorySummary:
      type: object
      required: [sampleCount, currentPrice, minPrice, maxPrice, firstPrice, lastPrice, changeAmount, changeRatePercent]
      properties:
        sampleCount:
          type: integer
        currentPrice:
          type: integer
        minPrice:
          type: integer
        maxPrice:
          type: integer
        firstPrice:
          type: integer
        lastPrice:
          type: integer
        changeAmount:
          type: integer
        changeRatePercent:
          type: number
    PriceAlertCreateRequest:
      type: object
      required: [partId, targetPrice]
      properties:
        partId:
          type: string
          format: uuid
        targetPrice:
          type: integer
    PriceAlertDto:
      type: object
      required: [partId, partName, targetPrice, currentPrice, status]
      properties:
        partId:
          type: string
          format: uuid
        partName:
          type: string
        targetPrice:
          type: integer
        currentPrice:
          type: integer
        status:
          $ref: "#/components/schemas/PriceAlertStatus"
        createdAt:
          type: string
          format: date-time
    PriceJobRunRequest:
      type: object
      properties:
        source:
          type: string
          example: manual
    PriceJobDto:
      type: object
      required: [id, status, requestedBy]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/PriceJobStatus"
        requestedBy:
          type: string
          format: uuid
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        errorSummary:
          type: string
        createdAt:
          type: string
          format: date-time
    ExternalOfferRefreshResponse:
      type: object
      required: [configured, limit, attempted, updated, skipped, failed]
      properties:
        configured:
          type: boolean
        category:
          $ref: "#/components/schemas/PartCategory"
          nullable: true
        limit:
          type: integer
        force:
          type: boolean
        attempted:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        failed:
          type: integer
        message:
          type: string
    PartCatalogRefreshResponse:
      type: object
      required: [configured, category, queryCount, limitPerQuery, attempted, discovered, published, failed]
      properties:
        configured:
          type: boolean
        jobId:
          type: string
          format: uuid
        category:
          $ref: "#/components/schemas/PartCategory"
        queryCount:
          type: integer
        limitPerQuery:
          type: integer
        publish:
          type: boolean
        attempted:
          type: integer
        discovered:
          type: integer
        published:
          type: integer
        failed:
          type: integer
        errorSummary:
          type: string
          nullable: true
        message:
          type: string
    ToolCheckRequest:
      type: object
      required: [partIds, context]
      properties:
        buildId:
          type: string
          format: uuid
        partIds:
          type: array
          items:
            type: string
            format: uuid
        context:
          type: object
          additionalProperties: true
    ToolCheckResponse:
      type: object
      required: [tool, status, score, confidence, summary, warnings, evidence, details]
      properties:
        tool:
          type: string
        status:
          $ref: "#/components/schemas/ToolStatus"
        score:
          type: number
          format: double
        confidence:
          $ref: "#/components/schemas/Confidence"
        summary:
          type: string
        warnings:
          type: array
          items:
            type: string
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/ToolEvidenceDto"
        details:
          type: object
          additionalProperties: true
    AgentSessionCreateRequest:
      type: object
      properties:
        requirementId:
          type: string
          format: uuid
          nullable: true
        buildId:
          type: string
          format: uuid
          nullable: true
        asTicketId:
          type: string
          format: uuid
          nullable: true
      description: requirementId, buildId, asTicketId 중 정확히 하나만 non-null이어야 한다.
    AgentSessionDto:
      type: object
      required: [id, status, stateTimeline]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/AgentSessionStatus"
        summary:
          type: string
          nullable: true
        stateTimeline:
          type: array
          items:
            $ref: "#/components/schemas/StateTimelineItemDto"
        toolInvocationIds:
          type: array
          items:
            type: string
            format: uuid
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
    AdminAgentSessionDto:
      allOf:
        - $ref: "#/components/schemas/AgentSessionDto"
        - type: object
          properties:
            toolInvocations:
              type: array
              items:
                $ref: "#/components/schemas/ToolInvocationDto"
            llmGenerations:
              type: array
              items:
                $ref: "#/components/schemas/LlmGenerationDto"
    StateTimelineItemDto:
      type: object
      required: [to, actor, at]
      properties:
        from:
          type: string
          nullable: true
        to:
          $ref: "#/components/schemas/AgentSessionStatus"
        actor:
          type: string
          enum: [USER, ADMIN, SYSTEM]
        at:
          type: string
          format: date-time
        reason:
          type: string
    RagEvidenceDto:
      type: object
      required: [id, sourceId, summary]
      properties:
        id:
          type: string
          format: uuid
        sourceId:
          type: string
        summary:
          type: string
        score:
          type: number
        metadata:
          type: object
          additionalProperties: true
    AdminRagEvidenceDto:
      allOf:
        - $ref: "#/components/schemas/RagEvidenceDto"
        - type: object
          properties:
            agentSessionId:
              type: string
              format: uuid
            chunkText:
              type: string
    ToolInvocationDto:
      type: object
      required: [id, agentSessionId, toolName, status, confidence, summary]
      properties:
        id:
          type: string
          format: uuid
        agentSessionId:
          type: string
          format: uuid
        toolName:
          type: string
          enum: [compatibility, power, size, performance, price]
        status:
          $ref: "#/components/schemas/ToolStatus"
        confidence:
          $ref: "#/components/schemas/Confidence"
        summary:
          type: string
        requestPayload:
          type: object
          additionalProperties: true
        resultPayload:
          type: object
          additionalProperties: true
        latencyMs:
