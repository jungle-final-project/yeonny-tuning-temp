components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    ToolCheckRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckRequest"
  responses:
    ToolCheckSuccess:
      description: Tool check 결과
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_STATE, DUPLICATE_RESOURCE, FILE_VALIDATION_ERROR, PRECONDITION_REQUIRED, UPSTREAM_ERROR, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: object
          description: >
            Endpoint-specific detail object. Auth/User contact validation errors may
            include field, reason, and message so clients can render field-level form
            errors, for example { field: "postalCode", reason: "INVALID_FORMAT",
            message: "우편번호는 5자리 숫자로 입력해 주세요." }. For performance Tool
            responses this may include cpuBenchmarkScore, gpuBenchmarkScore, and
            gameFpsEvidence items shaped like GameFpsEvidenceDto. gameFpsEvidenceStatus
            is included only when gameFpsEvidence has at least one row.
          additionalProperties: true
    GameFpsEvidenceDto:
      type: object
      required: [id, gameTitle, gameKey, resolution, graphicsPreset, avgFps, sourceName, sourceUrl, confidence, match]
      properties:
        id:
          type: string
          format: uuid
        gameTitle:
          type: string
        gameKey:
          type: string
        resolution:
          type: string
          enum: [FHD, QHD, 4K]
        graphicsPreset:
          type: string
        avgFps:
          type: number
          format: double
        onePercentLowFps:
          type: number
          format: double
          nullable: true
        sourceName:
          type: string
        sourceUrl:
          type: string
        sourceCheckedAt:
          type: string
          format: date
        confidence:
          $ref: "#/components/schemas/Confidence"
        match:
          type: object
          required: [gameMatched, resolutionMatched, gpuClassMatched, cpuClassMatched, exactGpuPartMatched, exactCpuPartMatched, evidenceExactness]
          properties:
            requestedGameKey:
              type: string
              nullable: true
            requestedResolution:
              type: string
              nullable: true
            selectedCpuClass:
              type: string
              nullable: true
            selectedGpuClass:
              type: string
              nullable: true
            sourceCpuClass:
              type: string
              nullable: true
            sourceGpuClass:
              type: string
              nullable: true
            hardwareScope:
              type: string
              nullable: true
            gameMatched:
              type: boolean
            resolutionMatched:
              type: boolean
            cpuClassMatched:
              type: boolean
            gpuClassMatched:
              type: boolean
            exactCpuPartMatched:
              type: boolean
            exactGpuPartMatched:
              type: boolean
            evidenceExactness:
              type: string
        sourceContext:
          type: object
          additionalProperties: true
        notes:
          type: string
          nullable: true
        guaranteePolicy:
          type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP, DOWN]
          example: UP
        database:
          type: string
          enum: [UP, UNKNOWN]
          example: UP
    Role:
      type: string
      enum: [USER, ADMIN]
    GenericStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
    ToolStatus:
      type: string
      enum: [PASS, WARN, FAIL]
    Confidence:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    PartCategory:
      type: string
      enum: [CPU, GPU, RAM, MOTHERBOARD, STORAGE, PSU, CASE, COOLER]
    AgentSessionStatus:
      type: string
