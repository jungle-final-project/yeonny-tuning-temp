      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PcAgentDiagnosisChatRequest"
      responses:
        "200":
          description: Stateless diagnosis chat response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PcAgentDiagnosisChatResponse"
        "400":
          description: message 누락 또는 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: agent token 누락 또는 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
