    delete:
      summary: 기본 견적 관계도 배치 초기화
      description: 저장된 견적 관계도 배치를 삭제하고 기본 좌표로 되돌린다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 초기화된 기본 견적 관계도 배치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphLayoutDto"
  /api/build-graphs/resolve:
    post:
      summary: Build 관계 그래프 계산
      description: AI 추천 조합 또는 현재 셀프견적 장바구니를 기준으로 부품 간 호환성, 전력, 규격, 성능, 가격 관계 그래프를 반환한다. 서버는 전달된 가격/부품명을 신뢰하지 않고 partId와 현재 quote draft를 기준으로 DB를 다시 조회한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildGraphResolveRequest"
      responses:
        "200":
          description: 관계 그래프 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildGraphResolveResponse"
        "400":
          description: source, partId, category 등 request validation 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: 활성 부품 또는 사용자 견적초안을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/parts:
    get:
      summary: 부품 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: q
          schema:
            type: string
          description: 부품명, 제조사, attributes JSON 검색어
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/GenericStatus"
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sort
          schema:
            type: string
            enum: [category, price_asc, price_desc, name, compatibility]
        - in: query
          name: compatibilitySource
          description: 특정 category 조회에서 현재 견적초안 기준 호환성 상태를 PartDto.compatibility에 포함한다. sort=compatibility와 함께 사용할 수 있다.
          schema:
            type: string
            enum: [QUOTE_DRAFT_CURRENT]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPage"
  /api/parts/compatible-candidates:
    post:
      summary: 현재 조합 기준 호환 부품 후보
      description: 그래프 노드 클릭 시 같은 카테고리 후보를 현재 AI_BUILD 또는 현재 견적초안 기준으로 Tool 검증해 반환한다. FAIL 후보는 기본 목록에서 제외하고 rejectedCount에 반영한다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompatiblePartCandidateRequest"
      responses:
        "200":
          description: 호환 후보 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompatiblePartCandidateResponse"
  /api/parts/{id}:
    get:
      summary: 부품 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 부품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartDto"
  /api/parts/{id}/price-history:
    get:
      summary: 부품 가격 이력
      description: 저장된 price_snapshots를 기준으로 상품별 가격변동 추이를 조회한다. 외부 검색 API를 실시간 호출하지 않는다. source를 생략하면 네이버 현재가 이력, 다나와 백업, 다나와 월별 추이, 수동 seed를 함께 반환할 수 있다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 3650
            default: 90
        - in: query
          name: source
          schema:
            type: string
          description: "특정 가격 출처만 조회할 때 사용한다. 생략하면 NAVER_SHOPPING_SEARCH, DANAWA_BACKUP, DANAWA_PRICE_TREND, MANUAL_CURRENT_LINEUP 등 저장된 전체 이력을 조회한다."
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        "200":
          description: 부품 가격 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPriceHistoryResponse"
  /api/quote-drafts/current:
    get:
