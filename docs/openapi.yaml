            type: string
            enum: [ACTIVE, INACTIVE, DISCONTINUED, DELETED]
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: includeDeleted
