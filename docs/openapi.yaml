      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsTicketCreateRequest"
      responses:
        "201":
          description: 생성된 AS 티켓
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
  /api/as-tickets/{id}:
    get:
      summary: AS 티켓 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: AS 티켓 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
  /api/ai/as-chat:
    get:
      summary: AS AI 챗봇 세션과 메시지 조회
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: asTicketId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AS AI 챗봇 세션과 대화 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsChatResponse"
    post:
      summary: AS AI 챗봇 메시지 전송
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-BuildGraph-AI-Profile
          required: false
          description: 내부 benchmark용 profile override. 사용자 화면은 보내지 않는다.
          schema:
            type: string
            enum: [AS_CHAT_FAST, AS_CHAT_54_FAST, AS_CHAT_54_MINI_FAST, AS_CHAT_NANO_FAST, AS_CHAT_BALANCED, AS_CHAT_HIGH_QUALITY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsChatRequest"
      responses:
        "200":
          description: AS AI 챗봇 LLM 구조화 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsChatResponse"
        "428":
          description: OPENAI_API_KEY 등 서버 선행 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM JSON 계약 위반 또는 외부 LLM 응답 처리 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/ai/as-chat/stream:
    post:
      summary: AS AI 챗봇 메시지 전송 진행 상태 SSE
      description: STARTED, RAG_READY, TOOLS_READY, LLM_RUNNING, DONE, ERROR 이벤트를 text/event-stream으로 반환한다. DONE data는 AsChatResponse JSON이다.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-BuildGraph-AI-Profile
          required: false
          description: 내부 benchmark용 profile override. 사용자 화면은 보내지 않는다.
          schema:
            type: string
            enum: [AS_CHAT_FAST, AS_CHAT_54_FAST, AS_CHAT_54_MINI_FAST, AS_CHAT_NANO_FAST, AS_CHAT_BALANCED, AS_CHAT_HIGH_QUALITY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsChatRequest"
      responses:
        "200":
          description: AS AI 챗봇 진행 상태와 최종 구조화 응답 SSE
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: USER 인증 필요
  /api/admin/dashboard:
    get:
      summary: 관리자 대시보드
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 관리자 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardDto"
  /api/admin/audit-logs/recent:
    get:
      summary: 최근 관리자 감사 로그
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 최근 감사 로그
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"
  /api/admin/agent-sessions:
    get:
      summary: 관리자 Agent 세션 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Agent 세션 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionPage"
  /api/admin/agent-sessions/{id}:
    get:
      summary: 관리자 Agent 세션 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Agent 세션 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAgentSessionDto"
  /api/admin/tool-invocations:
    get:
      summary: 관리자 Tool 호출 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Tool 호출 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvocationPage"
  /api/admin/tool-invocations/{id}:
    get:
      summary: 관리자 Tool 호출 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Tool 호출 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolInvocationDto"
  /api/admin/rag-evidence:
    get:
      summary: 관리자 RAG 근거 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 관리자 RAG 근거 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRagEvidencePage"
  /api/admin/rag-evidence/{id}:
    get:
      summary: 관리자 RAG 근거 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 관리자 RAG 근거 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRagEvidenceDto"
  /api/admin/rag-embeddings/backfill:
    post:
      summary: reusable RAG chunk embedding 백필
      description: Flyway가 아닌 관리자 수동 작업으로 agent_session_id가 없는 rag_evidence row의 pgvector embedding을 생성하거나 갱신한다.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 500
                  default: 200
      responses:
        "200":
          description: RAG embedding 백필 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEmbeddingBackfillResponse"
        "428":
          description: OPENAI_API_KEY 등 embedding 선행 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/as-tickets:
    get:
      summary: 관리자 AS 티켓 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: AS 티켓 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketPage"
  /api/admin/as-tickets/{id}:
    get:
      summary: 관리자 AS 티켓 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 관리자 AS 티켓 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
    patch:
      summary: 관리자 AS 티켓 수정
      description: payload는 status, assignedAdminId, adminNote와 PC Agent 검수 필드(reviewStatus, supportDecision, riskLevel, autoResponseAllowed)를 허용한다. 허용되지 않는 상태 전이는 409로 거절하고 admin_audit_logs에 기록한다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAsTicketUpdateRequest"
      responses:
        "200":
          description: 수정된 AS 티켓
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
        "409":
          description: 허용되지 않는 AS 티켓 상태 전이
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PublicId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  requestBodies:
    ToolCheckRequestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckRequest"
  responses:
    ToolCheckSuccess:
      description: Tool check 결과
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ToolCheckResponse"
  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT_STATE, DUPLICATE_RESOURCE, FILE_VALIDATION_ERROR, PRECONDITION_REQUIRED, UPSTREAM_ERROR, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: object
          description: >
            Tool-specific detail object. For performance Tool responses this may include
            cpuBenchmarkScore, gpuBenchmarkScore, and gameFpsEvidence items shaped
            like GameFpsEvidenceDto. gameFpsEvidenceStatus is included only when
            gameFpsEvidence has at least one row.
          additionalProperties: true
    GameFpsEvidenceDto:
      type: object
      required: [id, gameTitle, gameKey, resolution, graphicsPreset, avgFps, sourceName, sourceUrl, confidence, match]
      properties:
        id:
          type: string
          format: uuid
        gameTitle:
          type: string
        gameKey:
          type: string
        resolution:
          type: string
          enum: [FHD, QHD, 4K]
        graphicsPreset:
          type: string
        avgFps:
          type: number
          format: double
        onePercentLowFps:
          type: number
          format: double
          nullable: true
        sourceName:
          type: string
        sourceUrl:
          type: string
        sourceCheckedAt:
          type: string
          format: date
        confidence:
          $ref: "#/components/schemas/Confidence"
        match:
          type: object
          required: [gameMatched, resolutionMatched, gpuClassMatched, cpuClassMatched, exactGpuPartMatched, exactCpuPartMatched, evidenceExactness]
          properties:
            requestedGameKey:
              type: string
              nullable: true
            requestedResolution:
              type: string
              nullable: true
            selectedCpuClass:
              type: string
              nullable: true
            selectedGpuClass:
              type: string
              nullable: true
            sourceCpuClass:
              type: string
              nullable: true
            sourceGpuClass:
              type: string
              nullable: true
            hardwareScope:
              type: string
              nullable: true
            gameMatched:
              type: boolean
            resolutionMatched:
              type: boolean
            cpuClassMatched:
              type: boolean
            gpuClassMatched:
              type: boolean
            exactCpuPartMatched:
              type: boolean
            exactGpuPartMatched:
              type: boolean
            evidenceExactness:
              type: string
        sourceContext:
          type: object
          additionalProperties: true
        notes:
          type: string
          nullable: true
        guaranteePolicy:
          type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP, DOWN]
          example: UP
        database:
          type: string
          enum: [UP, UNKNOWN]
          example: UP
    Role:
      type: string
      enum: [USER, ADMIN]
    GenericStatus:
      type: string
      enum: [ACTIVE, INACTIVE, DISCONTINUED]
    ToolStatus:
      type: string
      enum: [PASS, WARN, FAIL]
    Confidence:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    PartCategory:
      type: string
      enum: [CPU, GPU, RAM, MOTHERBOARD, STORAGE, PSU, CASE, COOLER]
    AgentSessionStatus:
      type: string
      enum: [QUEUED, RUNNING, RAG_SEARCHED, TOOLS_CALLED, SUMMARY_READY, FALLBACK_READY, SUCCEEDED, FAILED, CANCELLED]
    AsTicketStatus:
      type: string
      enum: [OPEN, ASSIGNED, IN_PROGRESS, RESOLVED, CLOSED, CANCELLED]
    AsTicketAnalysisStatus:
      type: string
      enum: [NOT_STARTED, QUEUED, ANALYZING, RULE_READY, LLM_READY, FAILED]
    AsTicketReviewStatus:
      type: string
      enum: [NOT_REQUIRED, REQUIRED, IN_REVIEW, APPROVED, REJECTED]
    AsTicketSupportDecision:
      type: string
      enum: [SELF_SOLVABLE, REMOTE_POSSIBLE, VISIT_REQUIRED, NEEDS_MORE_INFO]
    RiskLevel:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]
    LogUploadStatus:
      type: string
      enum: [UPLOADED, PROCESSING, FAILED]
    PriceAlertStatus:
      type: string
      enum: [ACTIVE, TRIGGERED, DISABLED]
    PriceJobStatus:
      type: string
      enum: [QUEUED, RUNNING, SUCCEEDED, FAILED, CANCELLED]
    UserDto:
      type: object
      required: [id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
    SignupRequest:
      type: object
      required: [email, password, name, termsAccepted, marketingAccepted]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        name:
          type: string
        termsAccepted:
          type: boolean
        marketingAccepted:
          type: boolean
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserDto"
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required: [accessToken, refreshToken]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    AuthExchangeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    RequirementParseRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        resolution:
          type: string
        preferredVendors:
          type: array
          items:
            type: string
        priority:
          type: string
    RequirementDto:
      type: object
      required: [id, rawMessage]
      properties:
        id:
          type: string
          format: uuid
        rawMessage:
          type: string
        budget:
          type: integer
        usageTags:
          type: array
          items:
            type: string
        parsedContext:
          type: object
          additionalProperties: true
        questions:
          type: array
          items:
            $ref: "#/components/schemas/RequirementQuestionDto"
        agentSessionId:
          type: string
          format: uuid
          nullable: true
        agentSummary:
          type: string
          nullable: true
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
    RequirementQuestionDto:
      type: object
      required: [key, label, options, required]
      properties:
        key:
          type: string
        label:
          type: string
        options:
          type: array
          items:
            type: string
        required:
          type: boolean
    BuildRecommendRequest:
      type: object
      required: [requirementId]
      properties:
        requirementId:
          type: string
          format: uuid
        answers:
          type: object
          additionalProperties:
            type: string
    BuildRecommendResponse:
      type: object
      required: [agentSessionId, recommendations, warnings, evidenceIds]
      properties:
        agentSessionId:
          type: string
          format: uuid
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/BuildDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          description: Agent worker 완료 전에는 빈 배열일 수 있다.
          items:
            type: string
            format: uuid
        toolResults:
          type: array
          description: Agent worker 완료 전에는 빈 배열일 수 있다.
          items:
            $ref: "#/components/schemas/ToolResultDto"
    BuildSaveFromChatRequest:
      type: object
      required: [sourceBuildId, build]
      properties:
        sourceBuildId:
          type: string
          description: 프론트 sessionStorage.latestBuilds에 있던 임시 추천 build id
        lastUserMessage:
          type: string
          description: requirement raw_message로 저장할 마지막 사용자 요청. 없으면 build.summary를 사용한다.
        build:
          $ref: "#/components/schemas/AiBuildRecommendationDto"
    BuildSaveFromChatResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
          description: 저장된 DB build public id
    BuildDto:
      type: object
      required: [id, name, totalPrice, confidence, items, warnings, evidenceIds, changeableCategories]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        recommendedFor:
          type: string
        summary:
          type: string
        totalPrice:
          type: integer
        confidence:
          $ref: "#/components/schemas/Confidence"
        items:
          type: array
          items:
            $ref: "#/components/schemas/BuildItemDto"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WarningDto"
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
        changeableCategories:
          type: array
          items:
            $ref: "#/components/schemas/PartCategory"
        agentSessionId:
          type: string
          format: uuid
          nullable: true
        agentSummary:
          type: string
          nullable: true
        toolResults:
          type: array
          items:
            $ref: "#/components/schemas/ToolResultDto"
        createdAt:
          type: string
          format: date-time
    BuildItemDto:
      type: object
      required: [category, partId, name, price]
      properties:
        category:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PartCategory"
        partId:
          type: string
          format: uuid
        name:
          type: string
        manufacturer:
          type: string
          nullable: true
        price:
          type: integer
        attributes:
          type: object
          additionalProperties: true
    AiBuildTier:
      type: string
      enum: [budget, balanced, performance]
    AiBuildChatAnswerType:
      type: string
      enum: [BUDGET, PART, GENERAL]
    BuildGraphSource:
      type: string
      enum: [AI_BUILD, QUOTE_DRAFT_CURRENT]
    BuildGraphView:
      type: string
      enum: [FOCUSED, FULL]
    BuildGraphMode:
      type: string
      enum: [BUILD_OVERVIEW, PART_IMPACT, ISSUE_PATH, DRAFT_ACTION]
    BuildGraphNodeType:
      type: string
      enum: [PART, CONSTRAINT, ISSUE, ACTION]
    BuildGraphEdgeType:
      type: string
      enum: [REQUIRES, AFFECTS, BLOCKS, SUGGESTS]
    AiBuildChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        currentBuilds:
          type: array
          items:
            $ref: "#/components/schemas/AiBuildRecommendationDto"
        currentQuoteDraft:
          description: 현재 견적초안(그래프 상태) 문맥. 모든 화면에서 전달하며, 서버는 견적 완성 제약과 시뮬레이션 기준으로만 사용하고 직접 저장하지 않는다.
          allOf:
            - $ref: "#/components/schemas/QuoteDraftDto"
    AiBuildChatResponse:
      type: object
      required: [answerType, message, builds, warnings]
      properties:
        answerType:
          $ref: "#/components/schemas/AiBuildChatAnswerType"
        message:
          type: string
        builds:
          type: array
          description: 견적 추천 질문은 추천 build 2~3개를 반환한다. 시뮬레이션/명확화/미지원 응답에서는 빈 배열이다.
          items:
            $ref: "#/components/schemas/AiBuildRecommendationDto"
        simulation:
          nullable: true
          description: 부품을 실제로 바꾸지 않고 성능/FPS/스펙 변화를 보여주는 읽기 전용 시뮬레이션 결과.
          allOf:
            - $ref: "#/components/schemas/AiPerformanceSimulationDto"
        warnings:
          type: array
          items:
            type: string
        evidenceIds:
          type: array
          items:
            type: string
          description: Build chat RAG 검색에 사용된 reusable evidence public id 목록
        agentSessionId:
          type: string
          nullable: true
          description: 저장 가능한 Agent root가 있을 때만 채워진다. 홈 챗봇 단독 대화는 null일 수 있다.
    AiPerformanceSimulationDto:
      type: object
      required: [type, category, currentPart, targetPart, summary]
      properties:
        type:
          type: string
          enum: [PERFORMANCE_COMPARISON]
        category:
