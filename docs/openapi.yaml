      responses:
        "200":
          description: 보관된 데이터셋
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationTrainingDatasetDto"
  /api/admin/recommendation-training-datasets/{id}/items:
    get:
      summary: 추천 학습 데이터셋 item 목록
      security:
        - bearerAuth: []
