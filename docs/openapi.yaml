openapi: 3.0.3
info:
  title: BuildGraph AI MVP API
  version: 0.2.0
  description: BuildGraph 3주 MVP 공통 API 계약. 상세 기준은 docs/API_CONTRACT.md를 따른다.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/health:
    get:
      summary: API 상태 확인
      security: []
      responses:
        "200":
          description: 정상 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: DB 연결 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/users:
    post:
      summary: 회원가입
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: 생성된 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/login:
    post:
      summary: 이메일 로그인
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/auth/refresh:
    post:
      summary: access token 재발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: 재발급된 token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /api/auth/logout:
    post:
      security:
        - bearerAuth: []
      summary: 로그아웃
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: 로그아웃 완료
  /api/auth/me:
    get:
      summary: 현재 사용자 조회
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 사용자
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
  /api/auth/google/start:
    get:
      summary: Google OAuth 시작
      security: []
      responses:
        "302":
          description: Google OAuth로 redirect
  /api/auth/google/callback:
    get:
      summary: Google OAuth callback
      security: []
      responses:
        "302":
          description: 프론트 callback route로 redirect
  /api/auth/exchange:
    post:
      summary: OAuth one-time code 교환
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthExchangeRequest"
      responses:
        "200":
          description: JWT와 사용자 정보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/requirements/parse:
    post:
      summary: 자연어 요구사항 파싱
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementParseRequest"
      responses:
        "200":
          description: 파싱된 요구사항
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementDto"
  /api/builds/recommend:
    post:
      summary: 추천 Build 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRecommendRequest"
      responses:
        "200":
          description: 추천 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRecommendResponse"
  /api/builds/{id}:
    get:
      summary: Build 상세 조회
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Build 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildDto"
  /api/builds/history:
    get:
      summary: 내 Build 이력
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: Build 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildPage"
  /api/builds/{id}/change-part:
    post:
      summary: Build 부품 변경
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePartRequest"
      responses:
        "200":
          description: 부품 변경 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePartResponse"
  /api/parts:
    get:
      summary: 부품 목록
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: q
          schema:
            type: string
          description: 부품명, 제조사, attributes JSON 검색어
        - in: query
          name: manufacturer
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/GenericStatus"
        - in: query
          name: minPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: maxPrice
          schema:
            type: integer
            minimum: 0
        - in: query
          name: sort
          schema:
            type: string
            enum: [category, price_asc, price_desc, name]
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 부품 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPage"
  /api/parts/{id}:
    get:
      summary: 부품 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 부품 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartDto"
  /api/parts/{id}/price-history:
    get:
      summary: 부품 가격 이력
      description: 저장된 price_snapshots를 기준으로 상품별 가격변동 추이를 조회한다. 외부 검색 API를 실시간 호출하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 3650
            default: 90
        - in: query
          name: source
          schema:
            type: string
          description: "특정 가격 출처만 조회할 때 사용한다. 예: NAVER_SHOPPING_SEARCH"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        "200":
          description: 부품 가격 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartPriceHistoryResponse"
  /api/quote-drafts/current:
    get:
      summary: 현재 로그인 사용자의 수동 견적초안
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 현재 견적초안. active draft가 없으면 status=EMPTY로 반환한다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/quote-drafts/current/items/{partId}:
    put:
      summary: 견적초안에 부품 담기 또는 같은 카테고리 교체
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDraftItemUpsertRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
    patch:
      summary: 견적초안 부품 수량 변경
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteDraftItemUpsertRequest"
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
    delete:
      summary: 견적초안에서 부품 제거
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: partId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 갱신된 견적초안
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteDraftDto"
  /api/price-alerts:
    get:
      summary: 목표가 알림 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 목표가 알림 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertPage"
    post:
      summary: 목표가 알림 등록
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceAlertCreateRequest"
      responses:
        "201":
          description: 생성된 알림
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlertDto"
  /api/admin/price-jobs:
    get:
      summary: 관리자 가격 수집 작업 목록
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: 가격 수집 작업 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobPage"
  /api/admin/price-jobs/run:
    post:
      summary: 가격 수집 작업 실행
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PriceJobRunRequest"
      responses:
        "201":
          description: 생성된 가격 수집 작업
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceJobDto"
  /api/admin/parts/external-offers/refresh:
    post:
      summary: 외부 상품 캐시 갱신
      description: 네이버 쇼핑 검색 API를 호출해 part_external_offers 캐시를 갱신한다. 사용자 부품 조회 API는 이 캐시만 읽는다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: force
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 갱신 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalOfferRefreshResponse"
  /api/admin/parts/catalog/refresh:
    post:
      summary: 내부 자산 카탈로그 후보 갱신
      description: 카테고리별 query pack으로 외부 검색 API를 호출해 part_catalog_candidates를 채우고, publish=true일 때 parts에 게시한다. 사용자 부품 조회 API는 외부 API를 직접 호출하지 않는다.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: category
          required: true
          schema:
            $ref: "#/components/schemas/PartCategory"
        - in: query
          name: limitPerQuery
          schema:
            type: integer
            minimum: 1
            maximum: 5
            default: 3
        - in: query
          name: publish
          schema:
            type: boolean
            default: false
        - in: query
          name: q
          schema:
            type: string
          description: 단일 검색어 테스트용. 생략하면 category별 query pack을 사용한다.
      responses:
        "200":
          description: 내부 자산 갱신 결과
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartCatalogRefreshResponse"
  /api/tools/compatibility/check:
    post:
      summary: 호환성 Tool check
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/power/check:
    post:
      summary: 전력 Tool check
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/size/check:
    post:
      summary: 규격 Tool check
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/performance/check:
    post:
      summary: 성능 Tool check
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/tools/price/check:
    post:
      summary: 가격 Tool check
      security:
        - bearerAuth: []
      requestBody:
        $ref: "#/components/requestBodies/ToolCheckRequestBody"
      responses:
        "200":
          $ref: "#/components/responses/ToolCheckSuccess"
  /api/agent/sessions:
    post:
      summary: Agent 세션 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentSessionCreateRequest"
      responses:
        "201":
          description: 생성된 Agent 세션
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDto"
  /api/agent/sessions/{id}/run:
    post:
      summary: Agent 세션 실행 시작
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: RUNNING 상태로 전이된 Agent 세션
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDto"
  /api/agent/sessions/{id}:
    get:
      summary: Agent 세션 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: Agent 세션 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentSessionDto"
  /api/rag/search:
    get:
      summary: RAG 근거 검색
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Size"
      responses:
        "200":
          description: RAG 근거 후보
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEvidencePage"
  /api/rag/evidence/{id}:
    get:
      summary: RAG 근거 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: RAG 근거 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagEvidenceDto"
  /api/agent-logs/upload:
    post:
      summary: PC Agent JSONL 로그 업로드
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AgentLogUploadRequest"
      responses:
        "201":
          description: 업로드된 로그 메타데이터
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLogUploadDto"
  /api/agent-logs/{id}:
    get:
      summary: Agent 로그 업로드 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: 로그 업로드 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLogUploadDto"
  /api/as-tickets:
    post:
      summary: AS 티켓 생성
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsTicketCreateRequest"
      responses:
        "201":
          description: 생성된 AS 티켓
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
  /api/as-tickets/{id}:
    get:
      summary: AS 티켓 상세
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PublicId"
      responses:
        "200":
          description: AS 티켓 상세
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsTicketDto"
  /api/ai/as-chat:
    get:
      summary: AS AI 챗봇 세션과 메시지 조회
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: asTicketId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: AS AI 챗봇 세션과 대화 이력
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsChatResponse"
    post:
      summary: AS AI 챗봇 메시지 전송
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-BuildGraph-AI-Profile
          required: false
          description: 내부 benchmark용 profile override. 사용자 화면은 보내지 않는다.
          schema:
            type: string
            enum: [AS_CHAT_FAST, AS_CHAT_NANO_FAST, AS_CHAT_BALANCED, AS_CHAT_HIGH_QUALITY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsChatRequest"
      responses:
        "200":
          description: AS AI 챗봇 LLM 구조화 응답
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsChatResponse"
        "428":
          description: OPENAI_API_KEY 등 서버 선행 설정 누락
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: LLM JSON 계약 위반 또는 외부 LLM 응답 처리 실패
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/ai/as-chat/stream:
    post:
      summary: AS AI 챗봇 메시지 전송 진행 상태 SSE
      description: STARTED, RAG_READY, TOOLS_READY, LLM_RUNNING, DONE, ERROR 이벤트를 text/event-stream으로 반환한다. DONE data는 AsChatResponse JSON이다.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: X-BuildGraph-AI-Profile
          required: false
          description: 내부 benchmark용 profile override. 사용자 화면은 보내지 않는다.
          schema:
            type: string
            enum: [AS_CHAT_FAST, AS_CHAT_NANO_FAST, AS_CHAT_BALANCED, AS_CHAT_HIGH_QUALITY]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AsChatRequest"
      responses:
        "200":
          description: AS AI 챗봇 진행 상태와 최종 구조화 응답 SSE
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: USER 인증 필요
  /api/admin/dashboard:
    get:
      summary: 관리자 대시보드
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 관리자 요약
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardDto"
  /api/admin/audit-logs/recent:
    get:
      summary: 최근 관리자 감사 로그
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 최근 감사 로그
          content:
