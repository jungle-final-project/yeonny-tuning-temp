          description: 조회 창(일). 1~90으로 클램프된다.
      responses:
        "200":
          description: drift 스냅샷 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationDriftResponse"
  /api/admin/recommendation-training/overview:
    get:
      summary: 추천 학습 운영 요약
      description: HOME 추천 이벤트 중 학습 eligible, 성공 학습 투입, 미투입, 제외, 최근 Job과 활성 모델을 집계한다.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 추천 학습 운영 요약
